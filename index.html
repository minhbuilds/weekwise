<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekwise — Kids Schedule Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<style>
:root {
  --cream: #FDF8F0; --paper: #FFFCF7; --ink: #2C2416; --ink2: #5C5040; --ink3: #9C8E7E;
  --accent: #E8622A; --teal: #2A9D8F; --blue: #3A7BD5; --red: #E85454;
  --border: #E8DDD0; --shadow: rgba(44,36,22,0.08); --r: 12px; --r2: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
h1,h2,h3,h4,h5 { font-family: 'Nunito', sans-serif; }
#app { max-width: 820px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

/* HEADER */
.app-header { text-align: center; padding: 2rem 0 1.5rem; }
.logo { font-family: 'Nunito', sans-serif; font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
.logo span { color: var(--teal); }
.app-header p { color: var(--ink3); margin-top: .4rem; font-size: .9rem; }

/* CHILD TABS */
.child-tab-bar { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.25rem; }
.child-tab {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .85rem;
  padding: .4rem 1rem; border-radius: 20px; border: 2px solid var(--border);
  background: #fff; color: var(--ink2); cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: .4rem;
}
.child-tab:hover { border-color: var(--accent); color: var(--accent); }
.child-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.child-tab .del-tab { font-size: .9rem; opacity: .7; margin-left: .2rem; }
.child-tab .del-tab:hover { opacity: 1; }
.add-child-tab {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .82rem;
  padding: .38rem .9rem; border-radius: 20px; border: 2px dashed var(--border);
  background: none; color: var(--ink3); cursor: pointer; transition: all .2s;
}
.add-child-tab:hover { border-color: var(--teal); color: var(--teal); }

/* STEPS */
.steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 1.75rem; }
.step-dot { width: 30px; height: 30px; border-radius: 50%; background: var(--border); color: var(--ink3); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .82rem; display: flex; align-items: center; justify-content: center; transition: all .3s; flex-shrink: 0; }
.step-dot.active { background: var(--accent); color: #fff; }
.step-dot.done { background: var(--teal); color: #fff; }
.step-line { width: 40px; height: 2px; background: var(--border); flex-shrink: 0; transition: background .3s; }
.step-line.done { background: var(--teal); }

/* CARD */
.card { background: var(--paper); border: 1.5px solid var(--border); border-radius: var(--r); padding: 1.75rem; box-shadow: 0 2px 16px var(--shadow); animation: fadeUp .3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.card-title { font-size: 1.35rem; font-weight: 800; color: var(--ink); margin-bottom: .25rem; }
.card-sub { font-size: .88rem; color: var(--ink3); margin-bottom: 1.5rem; }

/* FORM */
.field { margin-bottom: 1.1rem; }
.field label { display: block; font-weight: 700; font-size: .82rem; color: var(--ink2); margin-bottom: .35rem; text-transform: uppercase; letter-spacing: .04em; }
.field input, .field select { width: 100%; padding: .58rem .85rem; border: 1.5px solid var(--border); border-radius: var(--r2); font-family: 'Lato', sans-serif; font-size: .92rem; background: #fff; color: var(--ink); transition: border-color .2s; appearance: none; }
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
.field .hint { font-size: .78rem; color: var(--ink3); margin-top: .3rem; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; }

/* BUTTONS */
.btn { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem; padding: .65rem 1.6rem; border-radius: var(--r2); border: none; cursor: pointer; transition: all .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #cf5522; transform: translateY(-1px); }
.btn-secondary { background: transparent; color: var(--ink2); border: 1.5px solid var(--border); }
.btn-secondary:hover { border-color: var(--ink3); }
.btn-teal { background: var(--teal); color: #fff; }
.btn-teal:hover { background: #228a7c; transform: translateY(-1px); }
.btn-sm { font-size: .8rem; padding: .38rem .85rem; }
.btn-red { background: #FEF2F2; color: var(--red); border: 1.5px solid #FECACA; }
.btn-red:hover { background: #FEE2E2; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.75rem; padding-top: 1.25rem; border-top: 1.5px solid var(--border); }

/* DAY CHECKBOXES */
.day-grid { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .4rem; }
.day-cb { display: none; }
.day-label { width: 36px; height: 28px; border: 1.5px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .76rem; font-weight: 700; color: var(--ink3); cursor: pointer; transition: all .2s; user-select: none; }
.day-cb:checked + .day-label { background: var(--accent); border-color: var(--accent); color: #fff; }

/* COLOR SWATCHES */
.color-opts { display: flex; gap: .35rem; flex-wrap: wrap; margin-top: .4rem; }
.color-opt { display: none; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.12); cursor: pointer; transition: transform .15s; }
.color-swatch:hover { transform: scale(1.2); }
.color-opt:checked + .color-swatch { border-color: #2C2416; transform: scale(1.2); }

/* ACTIVITY CARDS */
.item-list { display: flex; flex-direction: column; gap: .85rem; margin-bottom: 1rem; }
.act-card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--r2); overflow: hidden; }
.act-card-header { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; cursor: pointer; user-select: none; }
.act-card-header:hover { background: #FAFAF8; }
.act-header-left { display: flex; align-items: center; gap: .6rem; }
.act-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.act-header-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem; color: var(--ink); }
.act-header-meta { font-size: .78rem; color: var(--ink3); margin-top: .1rem; }
.act-header-right { display: flex; align-items: center; gap: .5rem; }
.act-chevron { font-size: .8rem; color: var(--ink3); transition: transform .2s; }
.act-card.open .act-chevron { transform: rotate(180deg); }
.act-card-body { padding: 1rem; border-top: 1.5px solid var(--border); display: none; }
.act-card.open .act-card-body { display: block; }

.remove-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--ink3); font-size: .85rem; padding: .2rem .5rem; cursor: pointer; line-height: 1; }
.remove-btn:hover { color: var(--red); border-color: #FECACA; background: #FEF2F2; }
.add-btn { width: 100%; padding: .65rem; border: 2px dashed var(--border); border-radius: var(--r2); background: none; color: var(--ink3); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .9rem; cursor: pointer; transition: all .2s; }
.add-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff8f5; }

/* EXTRAS STEP */
.extras-section { border-radius: var(--r2); }
.extras-toggle-hdr { display: flex; align-items: center; justify-content: space-between; padding: .75rem 0; cursor: pointer; user-select: none; }
.extras-toggle-hdr:hover { opacity: .85; }
.section-lbl { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--ink3); margin: 1.1rem 0 .6rem; display: flex; align-items: center; gap: .5rem; }
.section-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* PER-DAY TABLE */
.per-day-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
.per-day-table th { background: #F1F5F9; color: var(--ink3); font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; padding: .4rem .5rem; border: 1px solid var(--border); text-align: center; font-weight: 700; }
.per-day-table td { border: 1px solid var(--border); padding: .3rem .4rem; vertical-align: middle; }
.per-day-table td.day-td { font-weight: 700; color: var(--ink2); text-align: center; width: 38px; background: #FAFAF9; font-size: .8rem; }
.per-day-table td input[type=time] { border: 1px solid var(--border); border-radius: 5px; padding: .22rem .35rem; font-size: .8rem; width: 100%; background: #fff; font-family: 'Lato', sans-serif; }
.per-day-table td input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
.per-day-table td select { border: 1px solid var(--border); border-radius: 5px; padding: .22rem .3rem; font-size: .78rem; width: 100%; background: #fff; appearance: none; font-family: 'Lato', sans-serif; }
.per-day-table td input[type=number] { border: 1px solid var(--border); border-radius: 5px; padding: .22rem .35rem; font-size: .8rem; width: 100%; background: #fff; font-family: 'Lato', sans-serif; }

/* TRANSPORT BOX */
.transport-box { background: #F0FEFA; border: 1.5px solid #A7F3D0; border-radius: var(--r2); padding: .75rem 1rem; margin-top: .75rem; }
.transport-box-lbl { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: #065F46; margin-bottom: .6rem; }

/* TOGGLE SWITCH */
.toggle-row { display: flex; align-items: center; gap: .7rem; margin-bottom: .8rem; }
.toggle-row label { font-size: .85rem; font-weight: 600; color: var(--ink2); cursor: pointer; }
input[type=checkbox].toggle { width: 36px; height: 20px; appearance: none; background: var(--border); border-radius: 10px; cursor: pointer; transition: background .2s; position: relative; flex-shrink: 0; }
input[type=checkbox].toggle::after { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
input[type=checkbox].toggle:checked { background: var(--accent); }
input[type=checkbox].toggle:checked::after { left: 18px; }

/* SAVED BADGE */
.saved-badge { display: inline-flex; align-items: center; gap: .35rem; background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; border-radius: 20px; padding: .2rem .7rem; font-size: .78rem; font-weight: 700; opacity: 0; transition: opacity .5s; }
.saved-badge.show { opacity: 1; }

/* ── PRINT / PDF ── */
@media print {
  @page { size: A4 landscape; margin: 8mm 7mm 6mm 7mm; }
  body { background: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .no-print { display: none !important; }
  #printArea { display: block !important; }
}
#printArea { display: none; }

/* PREVIEW table (on screen) */
.preview-wrap { overflow-x: auto; margin-top: .5rem; }
.sched-table { width: 100%; border-collapse: collapse; font-size: 8.5pt; table-layout: fixed; }
.sched-table th { background: #1E3A5F; color: #fff; text-align: center; padding: 5px 3px; font-size: 8pt; font-weight: 700; border: 1px solid #8899AA; }
.sched-table td { border: 1px solid #D8DDE5; padding: 3px 4px; vertical-align: top; }
.sched-table td.tc { background: #F1F5F9 !important; color: #475569; text-align: center; font-weight: 700; width: 52px; vertical-align: middle; font-size: 8pt; white-space: nowrap; }
.cell-block { display: block; padding: 2px 4px; margin-bottom: 2px; border-radius: 3px; font-size: 7.5pt; line-height: 1.3; }
.transport-block { display: block; padding: 2px 4px; margin-bottom: 2px; border-radius: 3px; font-size: 7pt; line-height: 1.3; background: #DBEEFF; color: #1D4ED8; font-style: italic; }
.legend-bar { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0 8px; }
.legend-chip { padding: 2px 8px; border-radius: 20px; font-size: 7.5pt; font-weight: 700; }
.print-btn-row { display: flex; gap: .65rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="app">
  <div class="app-header no-print">
    <div class="logo">Week<span>wise</span> ⭐</div>
    <p>Build a beautiful weekly schedule for your kids — print-ready & shareable</p>
    <p style="font-size:.75rem;color:#C4B8A8;margin-top:.3rem">Built by Minh Tran</p>
  </div>
  <div style="text-align:center;margin-bottom:.5rem" class="no-print">
    <button onclick="resetAll()" style="font-size:.75rem;color:#9C8E7E;background:none;border:1px solid #E8DDD0;border-radius:20px;padding:.25rem .8rem;cursor:pointer;font-family:'Lato',sans-serif;" onmouseover="this.style.color='#E85454';this.style.borderColor='#FECACA'" onmouseout="this.style.color='#9C8E7E';this.style.borderColor='#E8DDD0'">🗑 Reset all data</button>
  </div>
  <div class="child-tab-bar no-print" id="childTabs"></div>
  <div class="steps no-print" id="stepIndicator"></div>
  <div id="stepContainer" class="no-print"></div>
</div>
<div id="printArea"></div>

<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_FULL = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const COLORS = [
  // Blues & Teals
  {n:'Blue',       bg:'#DBEAFE',tx:'#1E40AF'},
  {n:'Sky',        bg:'#E0F2FE',tx:'#0369A1'},
  {n:'Cyan',       bg:'#CFFAFE',tx:'#0E7490'},
  {n:'Teal',       bg:'#CCFBF1',tx:'#0F766E'},
  // Greens
  {n:'Mint',       bg:'#DCFCE7',tx:'#166534'},
  {n:'Sage',       bg:'#ECFDF5',tx:'#065F46'},
  {n:'Lime',       bg:'#F7FEE7',tx:'#3F6212'},
  // Yellows & Oranges
  {n:'Yellow',     bg:'#FEF9C3',tx:'#854D0E'},
  {n:'Amber',      bg:'#FEF3C7',tx:'#92400E'},
  {n:'Orange',     bg:'#FFEDD5',tx:'#C2410C'},
  {n:'Peach',      bg:'#FFF7ED',tx:'#9A3412'},
  // Reds & Pinks
  {n:'Red',        bg:'#FEE2E2',tx:'#991B1B'},
  {n:'Rose',       bg:'#FFE4E6',tx:'#9F1239'},
  {n:'Pink',       bg:'#FCE7F3',tx:'#9D174D'},
  {n:'Blush',      bg:'#FFF0FA',tx:'#86198F'},
  // Purples & Violets
  {n:'Purple',     bg:'#EDE9FE',tx:'#5B21B6'},
  {n:'Violet',     bg:'#F5F3FF',tx:'#4C1D95'},
  {n:'Lavender',   bg:'#EFF6FF',tx:'#3730A3'},
  {n:'Indigo',     bg:'#E0E7FF',tx:'#3730A3'},
  // Neutrals
  {n:'Sand',       bg:'#FEF3E8',tx:'#7C4B2A'},
  {n:'Warm Gray',  bg:'#F5F0EB',tx:'#4A3728'},
  {n:'Cool Gray',  bg:'#F1F5F9',tx:'#334155'},
  {n:'Slate',      bg:'#F8FAFC',tx:'#475569'},
  {n:'Stone',      bg:'#F5F5F4',tx:'#44403C'},
];

// Activity name suggestions — starts empty, grows as user types new names
// (persisted in S.activityNames across sessions)

const TRANSPORT_OPTS = [
  {v:'',            l:'— No transport needed —'},
  {v:'parents',     l:'🚗 Parents'},
  {v:'grandparents',l:'🚗 Grandparents'},
  {v:'friends',     l:'🚗 Friends'},
  {v:'bus',         l:'🚌 Bus'},
  {v:'train',       l:'🚆 Train'},
  {v:'uber',        l:'🚕 Uber / Taxi'},
  {v:'walk',        l:'🚶 Walk'},
  {v:'carpool',     l:'🚐 Carpool'},
  {v:'bike',        l:'🚲 Bike / Scooter'},
];

function tLabel(v) { return (TRANSPORT_OPTS.find(o=>o.v===v)||{l:v}).l; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
function newChild(name='') {
  return {
    id: Date.now()+Math.random(),
    name, wakeTime:'07:30', schoolStart:'09:00',
    schoolEnd:'15:30', sleepTarget:'20:30',
    schoolDays:[0,1,2,3,4],
    activities:[],
    homework:[],
    habits:[],
  };
}

let S = { children:[newChild('Child 1')], activeIdx:0, activityNames:[], locationNames:[] };
try {
  const sv=localStorage.getItem('wplan3');
  if(sv){
    const p=JSON.parse(sv);
    if(p&&p.children) S=p;
    if(!S.activityNames) S.activityNames=[];
    if(!S.locationNames) S.locationNames=[];
    S.children=S.children.map(sanitiseChild);
  }
} catch(e){}

function sanitiseChild(c){
  // Ensure all array fields exist — protects against old saved data missing new fields
  c.activities  = (c.activities  ||[]).map(a=>({ days:[], daySlots:{}, ...a }));
  c.homework    = (c.homework    ||[]).map(h=>({ days:[], ...h }));
  c.habits      = (c.habits      ||[]).map(h=>({ days:[0,1,2,3,4,5,6], ...h }));
  c.schoolDays  = c.schoolDays   ||[0,1,2,3,4];
  c.wakeTime    = c.wakeTime     ||'07:30';
  c.schoolStart = c.schoolStart  ||'09:00';
  c.schoolEnd   = c.schoolEnd    ||'15:30';
  c.sleepTarget = c.sleepTarget  ||'20:30';
  return c;
}

let step = 0;
const STEPS = ['Child','School','Activities','Extras','Preview'];
const ch = () => S.children[S.activeIdx];

function save(){ try{localStorage.setItem('wplan3',JSON.stringify(S));}catch(e){} }

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render(){
  renderTabs(); renderSteps(); renderStep();
}

function renderTabs(){
  document.getElementById('childTabs').innerHTML =
    S.children.map((c,i)=>`
      <button class="child-tab${i===S.activeIdx?' active':''}" onclick="switchChild(${i})">
        ${esc(c.name||'Child '+(i+1))}
        ${S.children.length>1?`<span class="del-tab" onclick="event.stopPropagation();delChild(${i})" title="Remove">✕</span>`:''}
      </button>`).join('') +
    `<button class="add-child-tab" onclick="addChild()">+ Add child</button>`;
}

function renderSteps(){
  document.getElementById('stepIndicator').innerHTML = STEPS.map((s,i)=>{
    const cls=i<step?'done':i===step?'active':'';
    const ln=i<STEPS.length-1?`<div class="step-line${i<step?' done':''}"></div>`:'';
    return `<div class="step-dot ${cls}" title="${s}">${i<step?'✓':i+1}</div>${ln}`;
  }).join('');
}

function renderStep(){
  const c=document.getElementById('stepContainer');
  switch(step){
    case 0: c.innerHTML=stepChild(); break;
    case 1: c.innerHTML=stepSchool(); break;
    case 2: c.innerHTML=stepActivities(); break;
    case 3: c.innerHTML=stepExtras(); break;
    case 4: c.innerHTML=''; renderPreview(); break;
  }
  bindStep();
}

// ══════════════════════════════════════════════
// STEP 0 — CHILD
// ══════════════════════════════════════════════
function stepChild(){
  const c=ch();
  return `<div class="card">
    <div class="card-title">🌟 About ${esc(c.name)||'your child'}</div>
    <div class="card-sub">Name and daily timing — this shapes the whole schedule.</div>
    <div class="field">
      <label>Child's name</label>
      <input type="text" id="fName" value="${esc(c.name)}" placeholder="e.g. Sophie">
    </div>
    <div class="row2">
      <div class="field">
        <label>Wake-up time</label>
        <input type="time" id="fWake" value="${c.wakeTime}">
      </div>
      <div class="field">
        <label>Target bedtime</label>
        <input type="time" id="fSleep" value="${c.sleepTarget}">
        <div class="hint">Goal — some busy days may run later</div>
      </div>
    </div>
    ${nav(false,true)}
  </div>`;
}

// ══════════════════════════════════════════════
// STEP 1 — SCHOOL
// ══════════════════════════════════════════════
function stepSchool(){
  const c=ch();
  return `<div class="card">
    <div class="card-title">📚 School schedule</div>
    <div class="card-sub">Set regular school hours and which days they attend.</div>
    <div class="row2">
      <div class="field">
        <label>School starts</label>
        <input type="time" id="fSchStart" value="${c.schoolStart}">
      </div>
      <div class="field">
        <label>School ends</label>
        <input type="time" id="fSchEnd" value="${c.schoolEnd}">
      </div>
    </div>
    <div class="field">
      <label>School days</label>
      <div class="day-grid">
        ${DAYS.map((d,i)=>{
          const chk=(c.schoolDays||[0,1,2,3,4]).includes(i)?'checked':'';
          return `<input type="checkbox" class="day-cb sch-day" id="sd${i}" value="${i}" ${chk}>
                  <label class="day-label" for="sd${i}">${d}</label>`;
        }).join('')}
      </div>
    </div>
    ${nav(true,true)}
  </div>`;
}

// ══════════════════════════════════════════════
// STEP 2 — ACTIVITIES
// ══════════════════════════════════════════════
function stepActivities(){
  const acts=ch().activities;
  return `<div class="card">
    <div class="card-title">🏊 Activities</div>

function actCard(a,i){

              <label class="color-swatch" for="col${i}_${ci}" style="background:${c.bg}" title="${c.n}"></label>`).join('')}
          </div>
        </div>
      </div>

      <!-- Per-day toggle -->
      <div class="toggle-row">
        <input type="checkbox" class="toggle aPerDay" id="pd${i}" data-i="${i}" ${a.perDay?'checked':''} onchange="togglePerDay(${i},this.checked)">

      </div>

      <!-- SAME TIME MODE -->
      <div id="sameMode_${i}" ${a.perDay?'style="display:none"':''}>
        <div class="row2" style="margin-bottom:.75rem">
          <div class="field" style="margin:0">
            <label>Start time</label>
            <input type="time" class="aStart" data-i="${i}" value="${a.start||''}">
          </div>
          <div class="field" style="margin:0">

        </div>
        <div class="field">
          <label>Days</label>
          <div class="day-grid">
            ${DAYS.map((d,di)=>`
              <input type="checkbox" class="day-cb aDay" id="ad${i}_${di}" value="${di}" ${(a.days||[]).includes(di)?'checked':''}>
              <label class="day-label" for="ad${i}_${di}">${d}</label>`).join('')}

        <!-- Transport same mode -->

function nav(back,next,nl='Next →'){
  return `<div class="nav-row">
    ${back?`<button class="btn btn-secondary" id="btnBack">← Back</button>`:'<div></div>'}
    <span class="saved-badge" id="savedBadge">✓ Saved</span>

// BIND
// ══════════════════════════════════════════════
function bindStep(){
  document.getElementById('btnNext')?.addEventListener('click',()=>{ collectStep(); step++; render(); });
  document.getElementById('btnBack')?.addEventListener('click',()=>{ collectStep(); step--; render(); });
  document.getElementById('btnAddAct')?.addEventListener('click',()=>{
    collectStep();
    ch().activities.push({name:'',start:'',end:'',days:[],colorIdx:nextColorIdx(),perDay:false,daySlots:{},note:'',transTo:'',transFrom:'',transMins:''});
    save(); render();
    const idx=ch().activities.length-1;
    const el=document.getElementById(`act_${idx}`);
    if(el&&!el.classList.contains('open')) el.classList.add('open');
  });
  document.getElementById('btnAddHw')?.addEventListener('click',()=>{
    collectStep();
    if(!ch().homework) ch().homework=[];
    ch().homework.push({name:'',estMins:20,dueDay:4,days:[],colorIdx:nextHwColorIdx(),note:''});
    save(); render();
    const idx=ch().homework.length-1;
    const el=document.getElementById(`hw_${idx}`);
    if(el&&!el.classList.contains('open')) el.classList.add('open');
  });
  document.getElementById('btnAddHab')?.addEventListener('click',()=>{
    collectStep();
    if(!ch().habits) ch().habits=[];
    ch().habits.push({name:'',mins:15,when:'morning',days:[0,1,2,3,4,5,6],colorIdx:nextHabColorIdx()});
    save(); render();
    const idx=ch().habits.length-1;
    const el=document.getElementById(`hab_${idx}`);
    if(el&&!el.classList.contains('open')) el.classList.add('open');
  });
}

function nextColorIdx(){
  const used=ch().activities.map(a=>a.colorIdx||0);
  for(let i=0;i<COLORS.length;i++) if(!used.includes(i)) return i;
  return used.length % COLORS.length;
}
function nextHwColorIdx(){
  const used=(ch().homework||[]).map(h=>h.colorIdx||0);
  for(let i=0;i<COLORS.length;i++) if(!used.includes(i)) return i;
  return used.length % COLORS.length;
}
function nextHabColorIdx(){
  const used=(ch().habits||[]).map(h=>h.colorIdx||0);
  for(let i=0;i<COLORS.length;i++) if(!used.includes(i)) return i;
  return used.length % COLORS.length;
}

function onHwDueChange(i, val){
  if(val==='weekdays'){
    // Auto-select Mon–Fri as best days
    [0,1,2,3,4].forEach(di=>{
      const cb=document.querySelector(`.hwDay[id="hwd${i}_${di}"]`);
      if(cb) cb.checked=true;
    });
    [5,6].forEach(di=>{
      const cb=document.querySelector(`.hwDay[id="hwd${i}_${di}"]`);
      if(cb) cb.checked=false;
    });
  }
}

function autoCheckSlot(input, i, di){
  if(input.value){
    const cb = document.querySelector(`.aSlotOn[data-i="${i}"][data-di="${di}"]`);
    if(cb) cb.checked = true;
  }
}

function toggleHw(i){ document.getElementById(`hw_${i}`)?.classList.toggle('open'); }

function onHwActivityLink(i, actName){
  const hw=ch().homework[i]; if(!hw) return;
  hw.linkedActivity = actName;
  if(actName){
    // Find the matching activity and copy its colorIdx
    const act=(ch().activities||[]).find(a=>a.name===actName);
    if(act){
      hw.colorIdx = act.colorIdx||0;
      // Update the radio buttons visually
      document.querySelectorAll(`input[name="hwcol${i}"]`).forEach(r=>{ r.checked = +r.value === hw.colorIdx; });
      // Update the dot in the header
      const col=COLORS[hw.colorIdx];
      const dot=document.querySelector(`#hw_${i} .act-color-dot`);
      if(dot){ dot.style.background=col.bg; dot.style.border=`2px solid ${col.tx}`; }
    }
  }
  save();
}

  if(!ch().homework[i]) return;
  ch().homework[i].name=v;

  if(el) el.innerHTML=v?esc(v):'<span style="color:#9C8E7E;font-weight:600">New task…</span>';

function liveHwColor(i,ci){
  if(!ch().homework[i]) return;

// ══════════════════════════════════════════════
// COLLECT
// ══════════════════════════════════════════════
function collectStep(){
  const c=ch();
  if(step===0){
    c.name=document.getElementById('fName')?.value||c.name;
    c.wakeTime=document.getElementById('fWake')?.value||c.wakeTime;
    c.sleepTarget=document.getElementById('fSleep')?.value||c.sleepTarget;
  }
  if(step===1){
    c.schoolStart=document.getElementById('fSchStart')?.value||c.schoolStart;
    c.schoolEnd=document.getElementById('fSchEnd')?.value||c.schoolEnd;
    c.schoolDays=[...document.querySelectorAll('.sch-day:checked')].map(el=>+el.value);
  }
  if(step===2){
    document.querySelectorAll('#actList .act-card').forEach((card,i)=>{
      const a=c.activities[i]; if(!a) return;
      a.name=card.querySelector('.aName')?.value||'';
      a.note=card.querySelector('.aNote')?.value||'';
      a.perDay=card.querySelector('.aPerDay')?.checked||false;
      const cc=card.querySelector('.aColor:checked');
      a.colorIdx=cc?+cc.value:0;
      if(!a.perDay){
        a.start=card.querySelector('.aStart')?.value||'';
        a.end=card.querySelector('.aEnd')?.value||'';
        a.days=[...card.querySelectorAll('.aDay:checked')].map(el=>+el.value);
        a.location=card.querySelector('.aLocation')?.value||'';
        a.transTo=card.querySelector('.aTransTo')?.value||'';
        a.transFrom=card.querySelector('.aTransFrom')?.value||'';
        a.transMins=card.querySelector('.aTransMins')?.value||'';
      } else {
        a.daySlots={};
        DAYS.forEach((_,di)=>{
          a.daySlots[di]={
            on:card.querySelector(`.aSlotOn[data-di="${di}"]`)?.checked||false,
            start:card.querySelector(`.aSlotStart[data-di="${di}"]`)?.value||'',
            end:card.querySelector(`.aSlotEnd[data-di="${di}"]`)?.value||'',
            location:card.querySelector(`.aSlotLoc[data-di="${di}"]`)?.value||'',
            transTo:card.querySelector(`.aSlotTransTo[data-di="${di}"]`)?.value||'',
            transFrom:card.querySelector(`.aSlotTransFrom[data-di="${di}"]`)?.value||'',
            transMins:card.querySelector(`.aSlotMins[data-di="${di}"]`)?.value||'',
          };
        });
        a.days=DAYS.map((_,di)=>di).filter(di=>a.daySlots[di]?.on);
      }
    });
  }
  if(step===3){
    document.querySelectorAll('#hwList .act-card').forEach((card,i)=>{
      const h=c.homework[i]; if(!h) return;
      h.name=card.querySelector('.hwName')?.value||'';
      h.note=card.querySelector('.hwNote')?.value||'';
      h.estMins=+card.querySelector('.hwMins')?.value||20;
      h.dueDay=card.querySelector('.hwDue')?.value;
      h.days=[...card.querySelectorAll('.hwDay:checked')].map(el=>+el.value);
      h.linkedActivity=card.querySelector('.hwLinkedAct')?.value||'';
      const cc=card.querySelector('.hwColor:checked');
      h.colorIdx=cc?+cc.value:0;
    });
    if(!c.habits) c.habits=[];
    document.querySelectorAll('#habList .act-card').forEach((card,i)=>{
      const h=c.habits[i]; if(!h) return;
      h.name=card.querySelector('.habName')?.value||'';
      h.mins=+card.querySelector('.habMins')?.value||15;
      h.when=card.querySelector('.habWhen')?.value||'morning';
      h.days=[...card.querySelectorAll('.habDay:checked')].map(el=>+el.value);
      const cc=card.querySelector('.habColor:checked');
      h.colorIdx=cc?+cc.value:0;
    });
  }
  save(); flash();
}

function doShareLink(){
  collectStep();
  try {
    // Strip bloat — only encode what's needed to render the schedule
    const c = ch();
    const slim = {
      n: c.name, w: c.wakeTime, ss: c.schoolStart, se: c.schoolEnd,
      st: c.sleepTarget, sd: c.schoolDays,
      a: (c.activities||[]).map(a=>({
        nm:a.name, ci:a.colorIdx, s:a.start, e:a.end, d:a.days,
        pd:a.perDay, ds:a.daySlots, nt:a.note,
        tt:a.transTo, tf:a.transFrom, tm:a.transMins, loc:a.location
      })),
      h: (c.homework||[]).map(h=>({nm:h.name,ci:h.colorIdx,m:h.estMins,dd:h.dueDay,d:h.days,nt:h.note})),
      hb: (c.habits||[]).map(h=>({nm:h.name,ci:h.colorIdx,m:h.mins,w:h.when,d:h.days})),
    };
    const json = JSON.stringify(slim);
    const compressed = LZString.compressToEncodedURIComponent(json);
    const url = location.href.split('#')[0] + '#v=' + compressed;

    const showShareModal = () => {
      showModal({
        title:'🔗 Share link ready!',
        body:`<p style="color:var(--ink3);font-size:.88rem;margin-bottom:.75rem">Copied! Anyone who opens it will see a <strong>view-only</strong> schedule — they can't edit it.</p>
          <input type="text" value="${url.replace(/"/g,'&quot;')}" readonly onclick="this.select()" style="width:100%;padding:.45rem .7rem;border:1.5px solid var(--border);border-radius:8px;font-size:.72rem;background:#F8FAFC;cursor:text;word-break:break-all">`,
        confirmLabel:'Done',
        onConfirm:()=>{}
      });
    };

    navigator.clipboard.writeText(url).then(showShareModal).catch(showShareModal);
  } catch(e) {
    showModal({
      title:'Could not generate link',
      body:`<p style="color:var(--ink3);font-size:.88rem">Try again or export as PDF instead.</p>`,
      confirmLabel:'OK', onConfirm:()=>{}
    });
  }
}

// ── Load from share hash — VIEW ONLY ──
function loadFromHash(){
  try {
    const hash = location.hash;
    if(!hash.startsWith('#v=')) return;
    const compressed = hash.slice(3);
    const json = LZString.decompressFromEncodedURIComponent(compressed);
    if(!json) return;
    const slim = JSON.parse(json);

    // Reconstruct a full child object from slim format
    const c = sanitiseChild({
      name: slim.n, wakeTime: slim.w, schoolStart: slim.ss,
      schoolEnd: slim.se, sleepTarget: slim.st, schoolDays: slim.sd,
      activities: (slim.a||[]).map(a=>({
        name:a.nm, colorIdx:a.ci, start:a.s, end:a.e, days:a.d||[],
        perDay:a.pd, daySlots:a.ds||{}, note:a.nt,
        transTo:a.tt, transFrom:a.tf, transMins:a.tm, location:a.loc
      })),
      homework: (slim.h||[]).map(h=>({name:h.nm,colorIdx:h.ci,estMins:h.m,dueDay:h.dd,days:h.d||[],note:h.nt})),
      habits: (slim.hb||[]).map(h=>({name:h.nm,colorIdx:h.ci,mins:h.m,when:h.w,days:h.d||[]})),
    });

    // Clear hash so it doesn't persist
    history.replaceState(null, '', location.pathname + location.search);

    // Show read-only view — don't touch user's own saved data
    showReadOnly(c);
  } catch(e) {
    // Silently ignore malformed hashes
  }
}

// ══════════════════════════════════════════════
// SCHEDULE DATA BUILDER
// ══════════════════════════════════════════════
function buildRows(c){
  const schoolDays=c.schoolDays||[0,1,2,3,4];
  const timeSet=new Set();
  timeSet.add(c.wakeTime);
  timeSet.add(c.schoolStart);
  (c.activities||[]).forEach(a=>{
    if(!a.perDay){ if(a.start) timeSet.add(a.start); }
    else if(a.daySlots){ Object.values(a.daySlots).forEach(sl=>{ if(sl.on&&sl.start) timeSet.add(sl.start); }); }
  });
  const sorted=[...timeSet].sort();
  sorted.push('sleep');

  return sorted.map(t=>{
    const cells=DAYS.map((_,di)=>{
      const items=[];
      if(t===c.wakeTime){
        items.push({label:`Wake ${c.wakeTime}`,bg:'#F8FAFC',tx:'#475569',transport:false});
      }
      if(t===c.schoolStart && schoolDays.includes(di)){
        items.push({label:`School\n${c.schoolStart}–${c.schoolEnd}`,bg:'#DBEAFE',tx:'#1E40AF',transport:false});
      }
      if(t!=='sleep'&&t!==c.wakeTime&&t!==c.schoolStart){
        (c.activities||[]).forEach(a=>{
          let on=false,start=a.start,end=a.end,location='',transTo='',transFrom='',transMins='';
          if(!a.perDay){
            on=(a.days||[]).includes(di)&&a.start===t;
            start=a.start; end=a.end;
            transTo=a.transTo||''; transFrom=a.transFrom||''; transMins=a.transMins||'';
            location=a.location||'';
          } else if(a.daySlots&&a.daySlots[di]){
            const sl=a.daySlots[di];
            on=sl.on&&(sl.start||a.start)===t;
            start=sl.start||a.start; end=sl.end||a.end;
            transTo=sl.transTo||''; transFrom=sl.transFrom||''; transMins=sl.transMins||'';
            location=sl.location||a.location||'';
          }
          if(!on) return;
          const col=COLORS[a.colorIdx||0];
          let lbl=a.name||'Activity';
          if(start||end) lbl+=`\n${start}${end?'–'+end:''}`;
          if(location) lbl+=`\n📍 ${location}`;
          if(a.note) lbl+=`\n(${a.note})`;
          items.push({label:lbl,bg:col.bg,tx:col.tx,transport:false});
          if(transTo){
            const mins=transMins?` ~${transMins}min`:'';
            items.push({label:`→ ${tLabel(transTo)}${mins}`,bg:'#E0F2FE',tx:'#0369A1',transport:true});
          }
          if(transFrom){
            items.push({label:`← ${tLabel(transFrom)}`,bg:'#F3E8FF',tx:'#7C3AED',transport:true});
          }
        });
      }
      if(t==='sleep'){
        items.push({label:`Sleep ${c.sleepTarget}`,bg:'#F5F3FF',tx:'#4C1D95',transport:false});
      }
      return items;
    });
    return {time: t==='sleep'?'😴':t, cells};
  });
}

  </head><body>
  <div class="page">${schedPage}</div>
  ${extrasPage ? `<div class="page">${extrasPage}</div>` : ''}
  </body></html>`;
}

function buildPrintPage(c, rows){
  const legendItems=[
    {name:'School',bg:'#DBEAFE',tx:'#1E40AF'},
    {name:'Bedtime',bg:'#F5F3FF',tx:'#4C1D95'},
    ...(c.activities||[]).map(a=>({name:a.name||'Activity',bg:COLORS[a.colorIdx||0].bg,tx:COLORS[a.colorIdx||0].tx})),
    ...(c.homework||[]).filter(h=>h.name).map(h=>({name:h.name,bg:COLORS[h.colorIdx||0].bg,tx:COLORS[h.colorIdx||0].tx})),
    ...(c.habits||[]).filter(h=>h.name).map(h=>({name:h.name,bg:COLORS[h.colorIdx||0].bg,tx:COLORS[h.colorIdx||0].tx})),
  ];
  const legend=legendItems.filter((v,i,arr)=>arr.findIndex(x=>x.name===v.name)===i)
    .map(it=>`<span class="legend-chip" style="background:${it.bg};color:${it.tx}">${esc(it.name)}</span>`).join('');
  return `
    <div style="text-align:center;margin-bottom:5px">
      <div style="font-size:14pt;font-weight:900;color:#1E3A5F">⭐ ${esc(c.name||'My Child')}'s Weekly Schedule</div>
      <div style="font-size:7pt;color:#64748B;margin-top:2px">Week of: _____________________</div>
    </div>
    <div class="legend-bar">${legend}</div>
    ${buildTableHTML(rows)}
    <div style="text-align:center;font-size:7pt;color:#94A3B8;margin-top:4px;font-style:italic">You are amazing — keep it up! 🌟</div>`;
}

function buildExtrasPage(c){
  const hw=(c.homework||[]).filter(h=>h.name);
  const hb=(c.habits||[]).filter(h=>h.name);
  if(!hw.length && !hb.length) return '';

  let html=`<div style="text-align:center;margin-bottom:8px">
    <div style="font-size:14pt;font-weight:900;color:#1E3A5F">📋 ${esc(c.name||'My Child')}'s Homework &amp; Habits</div>
    <div style="font-size:7pt;color:#64748B;margin-top:2px">Week of: _____________________</div>
  </div>`;

  if(hw.length){
    html+=`<div class="extras-section-hdr">📋 Homework &amp; Tasks</div>
    <table class="hw-table">
      <thead><tr>
        <th style="width:22%">Subject</th>
        <th style="width:8%">Est.</th>
        <th style="width:10%">Due</th>
        <th style="width:24%">Best day(s)</th>
        ${DAYS.map(d=>`<th style="width:5%;text-align:center">${d}</th>`).join('')}
        <th style="width:5%;text-align:center">Done</th>
      </tr></thead>
      <tbody>
        ${hw.map(h=>{
          const col=COLORS[h.colorIdx||0];
          const due=h.dueDay==='any'?'Any':h.dueDay==='weekdays'?'Weekdays':DAYS[h.dueDay]||'';
          const best=(h.days||[]).map(d=>DAYS[d]).join(', ')||'—';
          return `<tr>
            <td style="background:${col.bg};color:${col.tx};font-weight:700">${esc(h.name)}</td>
            <td style="text-align:center">${h.estMins}min</td>
            <td style="text-align:center;font-weight:700;color:#DC2626">${due}</td>
            <td>${best}</td>
            ${DAYS.map((_,di)=>`<td class="tick">${(h.days||[]).includes(di)?'<span style="background:'+col.bg+';color:'+col.tx+';padding:1px 4px;border-radius:3px">[ ]</span>':''}</td>`).join('')}
            <td class="tick">[ ]</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }

  if(hb.length){
    html+=`<div class="extras-section-hdr" style="margin-top:${hw.length?'12px':'0'};border-left-color:#2A9D8F;background:#F0FEFA">🌿 Good Habits</div>
    <table class="hab-table">
      <thead><tr>
        <th style="width:22%">Habit</th>
        <th style="width:8%">Time</th>
        <th style="width:10%">When</th>
        ${DAYS.map(d=>`<th style="width:8%;text-align:center">${d}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${hb.map(h=>{
          const col=COLORS[h.colorIdx||0];
          const when=h.when==='morning'?'🌅 Morning':h.when==='afternoon'?'☀️ Afternoon':h.when==='evening'?'🌙 Evening':'Anytime';
          return `<tr>
            <td style="background:${col.bg};color:${col.tx};font-weight:700">${esc(h.name)}</td>
            <td style="text-align:center">~${h.mins}min</td>
            <td>${when}</td>
            ${DAYS.map((_,di)=>`<td class="tick">${(h.days||[]).includes(di)?'<span style="background:'+col.bg+';color:'+col.tx+';padding:1px 4px;border-radius:3px">[ ]</span>':''}</td>`).join('')}
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }

  return html;
}

function resetAll(){
  showModal({
    title:'Reset all data?',
    body:`<p style="color:var(--ink3);font-size:.88rem">This clears all children, schedules, and saved activity names. This can't be undone.</p>`,
    confirmLabel:'Reset everything',
    confirmClass:'btn-red',
    onConfirm:()=>{
      localStorage.removeItem('wplan3');
      S = { children:[newChild('Child 1')], activeIdx:0, activityNames:[] };
      step=0; render();
    }
  });
}

// ── INLINE MODAL ──
function showModal({title, body, confirmLabel='OK', confirmClass='btn-primary', onConfirm}){
  document.getElementById('modalOverlay')?.remove();
  const el=document.createElement('div');
  el.id='modalOverlay';
  el.style.cssText='position:fixed;inset:0;background:rgba(44,36,22,.45);display:flex;align-items:center;justify-content:center;z-index:9999';
  el.innerHTML=`<div style="background:#FFFCF7;border-radius:14px;padding:1.75rem;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)">
    <h3 style="font-family:Nunito,sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:.6rem">${title}</h3>
    <div style="margin-bottom:1.25rem">${body}</div>
    <div style="display:flex;gap:.75rem;justify-content:flex-end">
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('modalOverlay').remove()">Cancel</button>
      <button class="btn ${confirmClass} btn-sm" id="modalConfirm">${confirmLabel}</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  el.addEventListener('click',e=>{ if(e.target===el) el.remove(); });
  document.getElementById('modalConfirm').addEventListener('click',()=>{ el.remove(); onConfirm(); });
}

loadFromHash();
render();
