<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekwise — Kids Schedule Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lato:wght@400;700&family=Fredoka+One&family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Poppins:wght@400;600;700;800&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<style>
:root {
  --cream: #FDF8F0; --paper: #FFFCF7; --ink: #2C2416; --ink2: #5C5040; --ink3: #9C8E7E;
  --accent: #E8622A; --teal: #2A9D8F; --blue: #3A7BD5; --red: #E85454;
  --border: #E8DDD0; --shadow: rgba(44,36,22,0.08); --r: 12px; --r2: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
h1,h2,h3,h4,h5 { font-family: 'Nunito', sans-serif; }
#app { max-width: 820px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

/* HEADER */
.app-header { text-align: center; padding: 2rem 0 1.5rem; }
.logo { font-family: 'Nunito', sans-serif; font-size: 2rem; font-weight: 900; color: var(--accent); letter-spacing: -1px; }
.logo span { color: var(--teal); }
.app-header p { color: var(--ink3); margin-top: .4rem; font-size: .9rem; }

/* CHILD TABS */
.child-tab-bar { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.25rem; }
.child-tab {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .85rem;
  padding: .4rem 1rem; border-radius: 20px; border: 2px solid var(--border);
  background: #fff; color: var(--ink2); cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: .4rem;
}
.child-tab:hover { border-color: var(--accent); color: var(--accent); }
.child-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.child-tab .del-tab { font-size: .9rem; opacity: .7; margin-left: .2rem; }
.child-tab .del-tab:hover { opacity: 1; }
.add-child-tab {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .82rem;
  padding: .38rem .9rem; border-radius: 20px; border: 2px dashed var(--border);
  background: none; color: var(--ink3); cursor: pointer; transition: all .2s;
}
.add-child-tab:hover { border-color: var(--teal); color: var(--teal); }

/* STEPS */
.steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 1.75rem; }
.step-dot { width: 30px; height: 30px; border-radius: 50%; background: var(--border); color: var(--ink3); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .82rem; display: flex; align-items: center; justify-content: center; transition: all .3s; flex-shrink: 0; }
.step-dot.active { background: var(--accent); color: #fff; }
.step-dot.done { background: var(--teal); color: #fff; }
.step-line { width: 40px; height: 2px; background: var(--border); flex-shrink: 0; transition: background .3s; }
.step-line.done { background: var(--teal); }

/* CARD */
.card { background: var(--paper); border: 1.5px solid var(--border); border-radius: var(--r); padding: 1.75rem; box-shadow: 0 2px 16px var(--shadow); animation: fadeUp .3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.card-title { font-size: 1.35rem; font-weight: 800; color: var(--ink); margin-bottom: .25rem; }
.card-sub { font-size: .88rem; color: var(--ink3); margin-bottom: 1.5rem; }

/* FORM */
.field { margin-bottom: 1.1rem; }
.field label { display: block; font-weight: 700; font-size: .82rem; color: var(--ink2); margin-bottom: .35rem; text-transform: uppercase; letter-spacing: .04em; }
.field input, .field select { width: 100%; padding: .58rem .85rem; border: 1.5px solid var(--border); border-radius: var(--r2); font-family: 'Lato', sans-serif; font-size: .92rem; background: #fff; color: var(--ink); transition: border-color .2s; appearance: none; }
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
.field .hint { font-size: .78rem; color: var(--ink3); margin-top: .3rem; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; }

/* BUTTONS */
.btn { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem; padding: .65rem 1.6rem; border-radius: var(--r2); border: none; cursor: pointer; transition: all .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #cf5522; transform: translateY(-1px); }
.btn-secondary { background: transparent; color: var(--ink2); border: 1.5px solid var(--border); }
.btn-secondary:hover { border-color: var(--ink3); }
.btn-teal { background: var(--teal); color: #fff; }
.btn-teal:hover { background: #228a7c; transform: translateY(-1px); }
.btn-sm { font-size: .8rem; padding: .38rem .85rem; }
.btn-red { background: #FEF2F2; color: var(--red); border: 1.5px solid #FECACA; }
.btn-red:hover { background: #FEE2E2; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.75rem; padding-top: 1.25rem; border-top: 1.5px solid var(--border); }

/* DAY CHECKBOXES */
.day-grid { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .4rem; }
.day-cb { display: none; }
.day-label { width: 36px; height: 28px; border: 1.5px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .76rem; font-weight: 700; color: var(--ink3); cursor: pointer; transition: all .2s; user-select: none; }
.day-cb:checked + .day-label { background: var(--accent); border-color: var(--accent); color: #fff; }

/* COLOR SWATCHES */
.color-opts { display: flex; gap: .3rem; flex-wrap: wrap; margin-top: .4rem; }
.color-opt { display: none; }
.color-swatch { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.15); cursor: pointer; transition: transform .15s; }
.color-swatch:hover { transform: scale(1.2); }
.color-opt:checked + .color-swatch { border-color: #2C2416; transform: scale(1.25); box-shadow: 0 0 0 2px #fff, 0 0 0 4px #2C2416; }

/* ACTIVITY CARDS */
.item-list { display: flex; flex-direction: column; gap: .85rem; margin-bottom: 1rem; }
.act-card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--r2); overflow: hidden; }
.act-card-header { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; cursor: pointer; user-select: none; }
.act-card-header:hover { background: #FAFAF8; }
.act-header-left { display: flex; align-items: center; gap: .6rem; }
.act-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.act-header-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem; color: var(--ink); }
.act-header-meta { font-size: .78rem; color: var(--ink3); margin-top: .1rem; }
.act-header-right { display: flex; align-items: center; gap: .5rem; }
.act-chevron { font-size: .8rem; color: var(--ink3); transition: transform .2s; }
.act-card.open .act-chevron { transform: rotate(180deg); }
.act-card-body { padding: 1rem; border-top: 1.5px solid var(--border); display: none; }
.act-card.open .act-card-body { display: block; }

.remove-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--ink3); font-size: .85rem; padding: .2rem .5rem; cursor: pointer; line-height: 1; }
.remove-btn:hover { color: var(--red); border-color: #FECACA; background: #FEF2F2; }
.add-btn { width: 100%; padding: .65rem; border: 2px dashed var(--border); border-radius: var(--r2); background: none; color: var(--ink3); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .9rem; cursor: pointer; transition: all .2s; }
.add-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff8f5; }

/* EXTRAS PREVIEW (inline on screen) */
.extras-section-hdr { font-size:.82rem; font-weight:700; color:#1E3A5F; background:#F1F5F9; padding:5px 10px; margin:10px 0 6px; border-left:3px solid #1E3A5F; border-radius:3px; }
.hw-table { width:100%; border-collapse:collapse; font-size:.82rem; margin-bottom:10px; }
.hw-table th { background:#1E3A5F; color:#fff; padding:5px 7px; text-align:left; font-size:.78rem; border:1px solid #8899AA; }
.hw-table td { border:1px solid #D8DDE5; padding:4px 7px; vertical-align:middle; }
.hab-table { width:100%; border-collapse:collapse; font-size:.82rem; }
.hab-table th { background:#2A9D8F; color:#fff; padding:5px 7px; text-align:left; font-size:.78rem; border:1px solid #8899AA; }
.hab-table td { border:1px solid #D8DDE5; padding:4px 7px; vertical-align:middle; }
.tick { text-align:center; font-size:.9rem; }
.extras-section { border-radius: var(--r2); }
.extras-toggle-hdr { display: flex; align-items: center; justify-content: space-between; padding: .75rem 0; cursor: pointer; user-select: none; }
.extras-toggle-hdr:hover { opacity: .85; }
.section-lbl { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--ink3); margin: 1.1rem 0 .6rem; display: flex; align-items: center; gap: .5rem; }
.section-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* PER-DAY TABLE */
.per-day-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
.per-day-table th { background: #F1F5F9; color: var(--ink3); font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; padding: .4rem .5rem; border: 1px solid var(--border); text-align: center; font-weight: 700; }
.per-day-table td { border: 1px solid var(--border); padding: .3rem .4rem; vertical-align: middle; }
.per-day-table td.day-td { font-weight: 700; color: var(--ink2); text-align: center; width: 38px; background: #FAFAF9; font-size: .8rem; }
.per-day-table td input[type=time] { border: 1px solid var(--border); border-radius: 5px; padding: .22rem .35rem; font-size: .8rem; width: 100%; background: #fff; font-family: 'Lato', sans-serif; }
.per-day-table td input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
.per-day-table td select { border: 1px solid var(--border); border-radius: 5px; padding: .22rem .3rem; font-size: .78rem; width: 100%; background: #fff; appearance: none; font-family: 'Lato', sans-serif; }
.per-day-table td input[type=number] { border: 1px solid var(--border); border-radius: 5px; padding: .22rem .35rem; font-size: .8rem; width: 100%; background: #fff; font-family: 'Lato', sans-serif; }

/* TRANSPORT BOX */
.transport-box { background: #F0FEFA; border: 1.5px solid #A7F3D0; border-radius: var(--r2); padding: .75rem 1rem; margin-top: .75rem; }
.transport-box-lbl { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: #065F46; margin-bottom: .6rem; }

/* TOGGLE SWITCH */
.toggle-row { display: flex; align-items: center; gap: .7rem; margin-bottom: .8rem; }
.toggle-row label { font-size: .85rem; font-weight: 600; color: var(--ink2); cursor: pointer; }
input[type=checkbox].toggle { width: 36px; height: 20px; appearance: none; background: var(--border); border-radius: 10px; cursor: pointer; transition: background .2s; position: relative; flex-shrink: 0; }
input[type=checkbox].toggle::after { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
input[type=checkbox].toggle:checked { background: var(--accent); }
input[type=checkbox].toggle:checked::after { left: 18px; }

/* SAVED BADGE */
.saved-badge { display: inline-flex; align-items: center; gap: .35rem; background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; border-radius: 20px; padding: .2rem .7rem; font-size: .78rem; font-weight: 700; opacity: 0; transition: opacity .5s; }
.saved-badge.show { opacity: 1; }

/* ── PRINT / PDF ── */
@media print {
  @page { size: A4 landscape; margin: 8mm 7mm 6mm 7mm; }
  body { background: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .no-print { display: none !important; }
  #printArea { display: block !important; }
}
#printArea { display: none; }

/* PREVIEW table (on screen) */
.preview-wrap { overflow-x: auto; margin-top: .5rem; }
.sched-table { width: 100%; border-collapse: collapse; font-size: 8.5pt; table-layout: fixed; }
.sched-table th { background: #1E3A5F; color: #fff; text-align: center; padding: 5px 3px; font-size: 8pt; font-weight: 700; border: 1px solid #8899AA; }
.sched-table td { border: 1px solid #D8DDE5; padding: 3px 4px; vertical-align: top; }
.sched-table td.tc { background: #F1F5F9 !important; color: #475569; text-align: center; font-weight: 700; width: 52px; vertical-align: middle; font-size: 8pt; white-space: nowrap; }
.cell-block { display: block; padding: 2px 4px; margin-bottom: 2px; border-radius: 3px; font-size: 7.5pt; line-height: 1.3; }
.transport-block { display: block; padding: 2px 4px; margin-bottom: 2px; border-radius: 3px; font-size: 7pt; line-height: 1.3; background: #DBEEFF; color: #1D4ED8; font-style: italic; }
.legend-bar { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0 8px; }
.legend-chip { padding: 2px 8px; border-radius: 20px; font-size: 7.5pt; font-weight: 700; }
.print-btn-row { display: flex; gap: .65rem; margin-bottom: 1.25rem; flex-wrap: wrap; }

/* Mobile */
@media (max-width: 600px) {
  .nav-row { flex-wrap: wrap; gap: .5rem; }
  .nav-row .btn { flex: 1; min-width: 120px; text-align: center; }
  .print-btn-row { flex-direction: column; }
  .print-btn-row .btn { width: 100%; }
  .row2 { grid-template-columns: 1fr; }
  .row3 { grid-template-columns: 1fr; }
  .per-day-table { font-size: .72rem; }
  .per-day-table th, .per-day-table td { padding: .2rem .25rem; }
  .per-day-table td input[type=time], .per-day-table td select, .per-day-table td input[type=number] { font-size: .72rem; padding: .15rem .2rem; }
  #app { padding: 1rem .75rem 3rem; }
  .child-tab-bar { gap: .35rem; }
  .child-tab { font-size: .78rem; padding: .35rem .75rem; }
}
</style>
</head>
<body>
<div id="app">
  <div class="app-header no-print">
    <div class="logo">Week<span>wise</span> ⭐</div>
    <p>Build a beautiful weekly schedule for your kids — print-ready & shareable</p>
    <p style="font-size:.75rem;color:#C4B8A8;margin-top:.3rem">Built by Minh Tran, assisted by Skylar Nguyen 🌟</p>
  </div>
  <div style="text-align:center;margin-bottom:.5rem" class="no-print">
    <button onclick="resetAll()" style="font-size:.75rem;color:#9C8E7E;background:none;border:1px solid #E8DDD0;border-radius:20px;padding:.25rem .8rem;cursor:pointer;font-family:'Lato',sans-serif;" onmouseover="this.style.color='#E85454';this.style.borderColor='#FECACA'" onmouseout="this.style.color='#9C8E7E';this.style.borderColor='#E8DDD0'">🗑 Reset all data</button>
  </div>
  <div class="child-tab-bar no-print" id="childTabs"></div>
  <div class="steps no-print" id="stepIndicator"></div>
  <div id="stepContainer" class="no-print"></div>
</div>
<div id="printArea"></div>

<script>
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// (persisted in S.activityNames across sessions)

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════════
// THEMES
// ══════════════════════════════════════════════
const THEMES = {

    font:'Rajdhani', bodyFont:'Lato',
    vars:{

    printHeader:'#0EA5E9', printHeaderText:'#FFFFFF',

  neutral: {

function applyTheme(id){
  const t = THEMES[id] || THEMES.neutral;
  S.theme = id;
  let styleEl = document.getElementById('themeStyle');
  if(!styleEl){ styleEl=document.createElement('style'); styleEl.id='themeStyle'; document.head.appendChild(styleEl); }
  const vars = Object.entries(t.vars).map(([k,v])=>`${k}:${v}`).join(';');

  // Base theme vars + fonts + themed schedule/extras tables for ALL themes
  styleEl.textContent = `:root{${vars}}
    body{font-family:'${t.bodyFont}',sans-serif}
    h1,h2,h3,h4,h5,.logo,.btn,.card-title,.child-tab,.step-dot{font-family:'${t.font}',sans-serif}
    .sched-table th{background:${t.printHeader}!important;color:${t.printHeaderText}!important;border-color:${t.printHeader}!important;font-family:'${t.font}',sans-serif}
    .sched-table td.tc{background:${t.printAccent}!important;color:${t.printAccentText}!important}
    .hw-table th{background:${t.printHeader}!important;color:${t.printHeaderText}!important;border-color:${t.printHeader}!important;font-family:'${t.font}',sans-serif}
    .hab-table th{background:${t.vars['--teal']||t.printHeader}!important;color:${t.printHeaderText}!important;border-color:${t.vars['--teal']||t.printHeader}!important;font-family:'${t.font}',sans-serif}
    .extras-section-hdr{background:${t.printAccent}!important;color:${t.printHeader}!important;border-left-color:${t.printHeader}!important;font-family:'${t.font}',sans-serif}
    .legend-chip{font-family:'${t.font}',sans-serif}

      .card{
        background:#FFFFFF;border-radius:0;border:none;border-left:3px solid #5B5FEF;
        box-shadow:0 0 0 1px rgba(91,95,239,0.08),4px 0 20px rgba(91,95,239,0.06);
        position:relative;overflow:hidden;
      }
      .card::before{content:'';position:absolute;top:0;right:0;width:120px;height:120px;
        background:radial-gradient(circle at top right,rgba(91,95,239,0.06),transparent 70%);pointer-events:none}
      .card-title{font-size:1.2rem;font-weight:700;letter-spacing:-0.5px;color:#0A0F1E;text-transform:uppercase;font-size:.95rem;letter-spacing:.12em}
      .card-sub{color:#64748B;font-size:.82rem;letter-spacing:.02em}

      /* Buttons — sharp, bold */
      .btn{border-radius:0;letter-spacing:.04em;text-transform:uppercase;font-size:.8rem;font-weight:700}
      .btn-primary{background:#5B5FEF;clip-path:none;position:relative;overflow:hidden}
      .btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);pointer-events:none}
      .btn-primary:hover{background:#4449D0;transform:none;box-shadow:0 0 20px rgba(91,95,239,0.4)}
      .btn-teal{background:#0A0F1E;border-radius:0}
      .btn-teal:hover{background:#06B6D4;transform:none;box-shadow:0 0 20px rgba(6,182,212,0.4)}
      .btn-secondary{border-radius:0;border:1px solid #E2E8F8;color:#1E2A45;background:#FFFFFF}
      .btn-secondary:hover{border-color:#5B5FEF;color:#5B5FEF;background:#EEF2FF}
      .btn-sm{font-size:.72rem}

      /* Inputs — sharp, minimal */
      .field input,.field select{
        border-radius:0;border:none;border-bottom:2px solid #E2E8F8;
        background:transparent;padding:.6rem .2rem;font-family:'Poppins',sans-serif;
        font-size:.88rem;color:#0A0F1E;
      }
      .field input:focus,.field select:focus{border-bottom-color:#5B5FEF;outline:none;box-shadow:none;background:#F8FAFF}
      .field label{color:#64748B;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600}

      /* Child tabs */
      .child-tab{background:#FFFFFF;border:1px solid #E2E8F8;border-radius:0;color:#1E2A45;font-weight:600;letter-spacing:.03em}
      .child-tab.active{background:#5B5FEF;border-color:#5B5FEF;color:#fff}
      .child-tab:hover:not(.active){border-color:#5B5FEF;color:#5B5FEF}

      /* Step dots — diamond shape via clip */
      .step-dot{background:#E2E8F8;color:#64748B;border-radius:0;transform:rotate(45deg);font-size:.7rem}
      .step-dot span, .step-dot{display:flex;align-items:center;justify-content:center}
      .step-dot.active{background:#5B5FEF;color:#fff}
      .step-dot.done{background:#06B6D4;color:#fff}
      .step-line{background:#E2E8F8;height:1px}
      .step-line.done{background:#5B5FEF}

      /* Day checkboxes */
      .day-label{border:1px solid #E2E8F8;border-radius:0;color:#64748B}
      .day-cb:checked + .day-label{background:#5B5FEF;border-color:#5B5FEF;color:#fff}

      /* Activity cards */
      .act-card{border-radius:0;border:none;border-left:2px solid #E2E8F8;background:#FFFFFF;box-shadow:none}
      .act-card-header:hover{background:#F8FAFF}
      .act-card.open{border-left-color:#5B5FEF}
      .act-card-body{border-top:1px solid #F0F4FF}

      /* Add button */
      .add-btn{border:1px dashed #C7D2FE;color:#94A3B8;border-radius:0}
      .add-btn:hover{border-color:#5B5FEF;color:#5B5FEF;background:#F0F4FF}

      /* Transport box */
      .transport-box{background:#F8FAFF;border:1px solid #E2E8F8;border-radius:0;border-left:2px solid #06B6D4}
      .transport-box-lbl{color:#06B6D4;letter-spacing:.08em}

      /* Section labels */
      .section-lbl{color:#94A3B8;font-size:.68rem;letter-spacing:.14em}
      .section-lbl::after{background:#E2E8F8}
      .nav-row{border-top:1px solid #E2E8F8}

      /* Per-day table */
      .per-day-table th{background:#F0F4FF;color:#64748B;border:1px solid #E2E8F8;letter-spacing:.06em;font-size:.68rem}
      .per-day-table td{border:1px solid #F0F4FF}
      .per-day-table td.day-td{background:#F8FAFF;color:#1E2A45;font-size:.78rem;letter-spacing:.04em}

      /* Colour swatches */
      .color-opt:checked + .color-swatch{border-color:#5B5FEF;box-shadow:0 0 0 2px #fff,0 0 0 4px #5B5FEF}

      /* Extras section */
      .extras-toggle-hdr{color:#0A0F1E}
      .extras-section{border-left:2px solid #E2E8F8;padding-left:.75rem}

      /* Logo */
      .logo{letter-spacing:-1px;font-size:1.8rem}

      /* Saved badge */
      .saved-badge{background:#EEF2FF;color:#5B5FEF;border-color:#C7D2FE;border-radius:0}

      /* Modern schedule/extras tables — sharp, geometric */
      .sched-table{border-radius:0!important}
      .sched-table td{border-color:#E2E8F8!important}
      .cell-block{border-radius:0!important;border-left:2px solid transparent}
      .hw-table td,.hab-table td{border-color:#EEF2FF!important}
      .hw-table,.hab-table{border-radius:0}
      .extras-section-hdr{border-left:3px solid #5B5FEF!important;letter-spacing:.08em!important;font-size:.72rem!important}
    `;
  }
  save();
}

function getTheme(){ return THEMES[S.theme] || THEMES.neutral; }

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
function newChild(name='') {
  return {
    id: Date.now()+Math.random(),
    name, wakeTime:'07:30', schoolStart:'09:00',
    schoolEnd:'15:30', sleepTarget:'20:30',
    schoolDays:[0,1,2,3,4],
    dayTimes:{},
    activities:[],
    homework:[],
    habits:[],
  };
}

let S = { children:[newChild('Child 1')], activeIdx:0, activityNames:[], locationNames:[], theme:'neutral', weekOf:'' };
try {
  const sv=localStorage.getItem('wplan3');
  if(sv){
    const p=JSON.parse(sv);
    if(p&&p.children) S=p;
    if(!S.activityNames) S.activityNames=[];
    if(!S.locationNames) S.locationNames=[];
    if(!S.theme) S.theme='neutral';
    if(!S.weekOf) S.weekOf='';
    S.children=S.children.map(sanitiseChild);
  }
} catch(e){}

function sanitiseChild(c){
  // Ensure all array fields exist — protects against old saved data missing new fields
  c.activities  = (c.activities  ||[]).map(a=>({ days:[], daySlots:{}, ...a }));
  c.homework    = (c.homework    ||[]).map(h=>({ days:[], ...h }));
  c.habits      = (c.habits      ||[]).map(h=>({ days:[0,1,2,3,4,5,6], ...h }));
  c.dayTimes    = c.dayTimes      ||{};
  c.wakeTime    = c.wakeTime     ||'07:30';
  c.schoolStart = c.schoolStart  ||'09:00';
  c.schoolEnd   = c.schoolEnd    ||'15:30';
  c.sleepTarget = c.sleepTarget  ||'20:30';
  c.noSchoolThisWeek = c.noSchoolThisWeek||false;
  return c;
}

let step = 0;
const STEPS = ['Theme','Child','School','Activities','Extras','Preview'];
const ch = () => S.children[S.activeIdx];

function save(){ try{localStorage.setItem('wplan3',JSON.stringify(S));}catch(e){} }

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render(){
  renderTabs(); renderSteps(); renderStep();
}

function renderTabs(){
  document.getElementById('childTabs').innerHTML =
    S.children.map((c,i)=>`
      <button class="child-tab${i===S.activeIdx?' active':''}" onclick="switchChild(${i})">
        ${esc(c.name||'Child '+(i+1))}
        ${i===S.activeIdx?`<span class="del-tab" onclick="event.stopPropagation();duplicateChild(${i})" title="Duplicate this child">⧉</span>`:''}
        ${S.children.length>1?`<span class="del-tab" onclick="event.stopPropagation();delChild(${i})" title="Remove">✕</span>`:''}
      </button>`).join('') +
    `<button class="add-child-tab" onclick="addChild()">+ Add child</button>`;
}

function renderSteps(){
  document.getElementById('stepIndicator').innerHTML = STEPS.map((s,i)=>{
    const cls=i<step?'done':i===step?'active':'';
    const ln=i<STEPS.length-1?`<div class="step-line${i<step?' done':''}"></div>`:'';
    return `<div class="step-dot ${cls}" title="${s}">${i<step?'✓':i+1}</div>${ln}`;
  }).join('');
}

function renderStep(){
  const c=document.getElementById('stepContainer');
  switch(step){
    case 0: c.innerHTML=stepTheme(); break;
    case 1: c.innerHTML=stepChild(); break;
    case 2: c.innerHTML=stepSchool(); break;
    case 3: c.innerHTML=stepActivities(); break;
    case 4: c.innerHTML=stepExtras(); break;
    case 5: c.innerHTML=''; renderPreview(); break;
  }
  bindStep();
}

// ══════════════════════════════════════════════
// STEP 0 — THEME PICKER
// ══════════════════════════════════════════════
function stepTheme(){
  const themeConfigs = {
    cute:      {bg:'linear-gradient(135deg,#EDE6FF,#D9EEFF)',border:'#C9B8F0',selBg:'#B78FE0'},
    sporty:    {bg:'linear-gradient(135deg,#DBEAFE,#D1FAE5)',border:'#93C5FD',selBg:'#0EA5E9'},
    neutral:   {bg:'linear-gradient(135deg,#F0EBE0,#E8F0E8)',border:'#D4C9B8',selBg:'#C17F52'},
    modern:    {bg:'linear-gradient(135deg,#EEF2FF,#E0E7FF)',border:'#A5B4FC',selBg:'#5B5FEF'},
    colourful: {bg:'linear-gradient(90deg,#FFB3BA,#FFDFBA,#FFFFBA,#BAFFC9,#BAE1FF,#E8BAFF)',border:'#FFB3BA',selBg:'#FF4D6D'},
    gaming:    {bg:'linear-gradient(135deg,#1A1D27,#0F1117)',border:'#2D3348',selBg:'#7DF9C2'},
  };
  return `<div class="card">
    <div class="card-title">🎨 Choose your theme</div>
    <div class="card-sub">Pick a style that fits your child's personality.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.85rem;margin-bottom:1rem">
      ${Object.values(THEMES).map(t=>{
        const cfg=themeConfigs[t.id]||{bg:'#fff',border:'#ccc',selBg:'#666'};
        const selected=S.theme===t.id;
        return `<div onclick="selectTheme('${t.id}')" style="
          border-radius:14px;padding:1.25rem .75rem;text-align:center;cursor:pointer;
          background:${selected?cfg.selBg:cfg.bg};
          border:2.5px solid ${selected?cfg.selBg:cfg.border};
          transition:all .2s;position:relative;box-shadow:${selected?'0 4px 16px rgba(0,0,0,0.15)':'0 2px 8px rgba(0,0,0,0.06)'};
          transform:${selected?'scale(1.04)':'scale(1)'};
        ">
          <div style="font-size:2.1rem;margin-bottom:.45rem">${t.emoji}</div>
          <div style="font-family:'${t.font}',sans-serif;font-weight:700;font-size:.88rem;color:${selected?'#fff':(t.id==='gaming'?'#7DF9C2':'var(--ink)')}">${t.name}</div>
          ${selected?`<div style="position:absolute;top:.4rem;right:.5rem;font-size:.8rem;color:rgba(255,255,255,0.9)">✓</div>`:''}
        </div>`;
      }).join('')}
    </div>
    ${nav(false,true,'Next →')}
  </div>`;
}

function selectTheme(id){
  applyTheme(id);
  render(); // re-render to update selection UI
}

// ══════════════════════════════════════════════
// STEP 1 — CHILD
// ══════════════════════════════════════════════
function stepChild(){
  const c=ch();
  const dt=c.dayTimes||{};
  return `<div class="card">
    <div class="card-title">🌟 About ${esc(c.name)||'your child'}</div>
    <div class="card-sub">Set the name, then customise wake-up and bedtime for each day of the week.</div>
    <div class="field">
      <label>Child's name</label>
      <input type="text" id="fName" value="${esc(c.name)}" placeholder="e.g. Sophie">
    </div>

    <div class="section-lbl">Default times (used as fallback)</div>
    <div class="row2" style="margin-bottom:1rem">
      <div class="field" style="margin:0">
        <label>Default wake-up</label>
        <input type="time" id="fWake" value="${c.wakeTime}" oninput="refreshDayTimesDefaults()" onchange="refreshDayTimesDefaults()">
      </div>
      <div class="field" style="margin:0">
        <label>Default bedtime</label>
        <input type="time" id="fSleep" value="${c.sleepTarget}" oninput="refreshDayTimesDefaults()" onchange="refreshDayTimesDefaults()">
      </div>
    </div>

    <div class="section-lbl">Per-day times <span style="font-weight:400;text-transform:none;font-size:.78rem">(auto-filled from defaults — edit any day as needed)</span></div>
    <table class="per-day-table" id="dayTimesTable">
      <thead><tr>
        <th style="width:60px">Day</th>
        <th>Wake-up time</th>
        <th>Bedtime</th>
      </tr></thead>
      <tbody>
        ${DAYS.map((d,di)=>{
          const row=dt[di]||{};
          return `<tr>
            <td class="day-td">${d}</td>
            <td><input type="time" class="dtWake" data-di="${di}" value="${row.wake||c.wakeTime||''}"></td>
            <td><input type="time" class="dtSleep" data-di="${di}" value="${row.sleep||c.sleepTarget||''}"></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    ${nav(false,true)}
  </div>`;
}

function refreshDayTimesDefaults(){
  const wake = document.getElementById('fWake')?.value||'';
  const sleep = document.getElementById('fSleep')?.value||'';
  // Fill all rows — user can then override specific days manually
  if(wake) document.querySelectorAll('.dtWake').forEach(el=>{ el.value=wake; });
  if(sleep) document.querySelectorAll('.dtSleep').forEach(el=>{ el.value=sleep; });
}

// ══════════════════════════════════════════════
// STEP 1 — SCHOOL
// ══════════════════════════════════════════════
function stepSchool(){
  const c=ch();
  const noSchool=c.noSchoolThisWeek||false;
  return `<div class="card">
    <div class="card-title">📚 School schedule</div>
    <div class="card-sub">Set regular school hours and which days they attend.</div>

    <!-- No school this week toggle -->
    <div style="display:flex;align-items:center;justify-content:space-between;background:${noSchool?'#FEF9C3':'var(--paper)'};border:1.5px solid ${noSchool?'#FDE68A':'var(--border)'};border-radius:var(--r2);padding:.75rem 1rem;margin-bottom:1rem;cursor:pointer" onclick="toggleNoSchool()">
      <div>
        <div style="font-family:Nunito,sans-serif;font-weight:800;font-size:.9rem;color:${noSchool?'#854D0E':'var(--ink)'}">🏖️ No school this week</div>
        <div style="font-size:.78rem;color:${noSchool?'#A16207':'var(--ink3)'};margin-top:.15rem">${noSchool?'School is hidden from the schedule this week':'E.g. March Break, Winter Break, Public Holiday'}</div>
      </div>
      <input type="checkbox" id="noSchoolToggle" class="toggle" ${noSchool?'checked':''} onclick="event.stopPropagation();toggleNoSchool()" style="flex-shrink:0">
    </div>

    <!-- Regular school fields — hidden when no school -->
    <div id="schoolFields" ${noSchool?'style="opacity:.4;pointer-events:none"':''}>
      <div class="row2">
        <div class="field">
          <label>School starts</label>
          <input type="time" id="fSchStart" value="${c.schoolStart}">
        </div>
        <div class="field">
          <label>School ends</label>
          <input type="time" id="fSchEnd" value="${c.schoolEnd}">
        </div>
      </div>
      <div class="field">
        <label>School days</label>
        <div class="day-grid">
          ${DAYS.map((d,i)=>{
            const chk=(c.schoolDays||[0,1,2,3,4]).includes(i)?'checked':'';
            return `<input type="checkbox" class="day-cb sch-day" id="sd${i}" value="${i}" ${chk}>
                    <label class="day-label" for="sd${i}">${d}</label>`;
          }).join('')}
        </div>
      </div>
    </div>
    ${nav(true,true)}
  </div>`;
}

function toggleNoSchool(){
  const cb=document.getElementById('noSchoolToggle');
  const c=ch();
  c.noSchoolThisWeek = cb ? cb.checked : !c.noSchoolThisWeek;
  // Also collect the other school fields so we don't lose them on re-render
  c.schoolStart=document.getElementById('fSchStart')?.value||c.schoolStart;
  c.schoolEnd=document.getElementById('fSchEnd')?.value||c.schoolEnd;
  c.schoolDays=[...document.querySelectorAll('.sch-day:checked')].map(el=>+el.value);
  save(); render();
}

// ══════════════════════════════════════════════
// STEP 2 — ACTIVITIES
// ══════════════════════════════════════════════
function stepActivities(){
  const acts=ch().activities;
  return `<div class="card">
    <div class="card-title">🏊 Activities</div>
    <div class="card-sub">Add extracurricular activities outside of school — sports, tutoring, music lessons, playdates, tournaments, classes and more.</div>
    <datalist id="actDs">${S.activityNames.map(s=>`<option value="${esc(s)}">`).join('')}</datalist>
    <datalist id="locDs">${S.locationNames.map(s=>`<option value="${esc(s)}">`).join('')}</datalist>
    <div class="item-list" id="actList">
      ${(acts||[]).map((a,i)=>actCard(a,i)).join('')}
    </div>
    <button class="add-btn" id="btnAddAct">+ Add activity</button>
    ${nav(true,true,'Next →')}
  </div>`;
}

function actCard(a,i){
  const col=COLORS[a.colorIdx||0];
  const total=ch().activities.length;
  const activeDays = a.perDay
    ? DAYS.filter((_,di)=>a.daySlots&&a.daySlots[di]&&a.daySlots[di].on).map((_,di)=>di)
    : (a.days||[]);
  const dayStr = activeDays.length ? activeDays.map(di=>DAYS[di]).join(', ') : 'No days';
  const timeStr = a.perDay ? 'Per-day times' : (a.start&&a.end?`${a.start}–${a.end}`:'Time TBD');

  return `<div class="act-card${!a.name?' open':''}" id="act_${i}">
    <div class="act-card-header" onclick="toggleAct(${i})">
      <div class="act-header-left">
        <div class="act-color-dot" style="background:${col.bg};border:2px solid ${col.tx}"></div>
        <div>
          <div class="act-header-name">${a.name?esc(a.name):'<span style="color:#9C8E7E;font-weight:600">New activity…</span>'}</div>
          <div class="act-header-meta" id="actMeta_${i}">${dayStr} &nbsp;·&nbsp; ${timeStr}</div>
        </div>
      </div>
      <div class="act-header-right">
        <span class="act-chevron">▼</span>
        <div style="display:flex;gap:.3rem" onclick="event.stopPropagation()">
          ${i>0?`<button class="remove-btn" title="Move up" onclick="moveAct(${i},-1)">↑</button>`:''}
          ${i<total-1?`<button class="remove-btn" title="Move down" onclick="moveAct(${i},1)">↓</button>`:''}
          <button class="remove-btn" title="Duplicate" onclick="duplicateAct(${i})">⧉</button>
          <button class="remove-btn" onclick="removeAct(${i})">×</button>
        </div>
      </div>
    </div>
    <div class="act-card-body">
      <!-- Name + Color -->
      <div class="row2" style="margin-bottom:.85rem">
        <div class="field" style="margin:0">
          <label>Activity name</label>
          <input type="text" list="actDs" class="aName" data-i="${i}" value="${esc(a.name||'')}" placeholder="e.g. Swim Training" oninput="liveNameHeader(${i},this.value)" onblur="saveActivityName(this.value)">
        </div>
        <div class="field" style="margin:0">
          <label>Colour</label>
          <div class="color-opts">
            ${COLORS.map((c,ci)=>`
              <input type="radio" class="color-opt aColor" name="col${i}" id="col${i}_${ci}" value="${ci}" ${(a.colorIdx||0)==ci?'checked':''} onchange="liveColorUpdate(${i},${ci})">
              <label class="color-swatch" for="col${i}_${ci}" style="background:${c.bg}" title="${c.n}"></label>`).join('')}
          </div>
        </div>
      </div>

      <!-- Per-day toggle -->
      <div class="toggle-row">
        <input type="checkbox" class="toggle aPerDay" id="pd${i}" data-i="${i}" ${a.perDay?'checked':''} onchange="togglePerDay(${i},this.checked)">
        <label for="pd${i}">Different times on different days</label>
      </div>

      <!-- SAME TIME MODE -->
      <div id="sameMode_${i}" ${a.perDay?'style="display:none"':''}>
        <div class="row2" style="margin-bottom:.75rem">
          <div class="field" style="margin:0">
            <label>Start time</label>
            <input type="time" class="aStart" data-i="${i}" value="${a.start||''}" oninput="ch().activities[${i}].start=this.value;liveActMeta(${i})">
          </div>
          <div class="field" style="margin:0">
            <label>End time</label>
            <input type="time" class="aEnd" data-i="${i}" value="${a.end||''}" oninput="ch().activities[${i}].end=this.value;liveActMeta(${i})">
          </div>
        </div>
        <div class="field">
          <label style="display:flex;align-items:center;justify-content:space-between">
            Days
            <span onclick="clearActSelection(${i})" style="font-size:.72rem;font-weight:600;color:var(--accent);cursor:pointer;text-transform:none;letter-spacing:0;opacity:.8" title="Uncheck all days and clear times">✕ Clear</span>
          </label>
          <div class="day-grid">
            ${DAYS.map((d,di)=>`
              <input type="checkbox" class="day-cb aDay" id="ad${i}_${di}" value="${di}" ${(a.days||[]).includes(di)?'checked':''} onchange="liveActMeta(${i})">
              <label class="day-label" for="ad${i}_${di}">${d}</label>`).join('')}
          </div>
        </div>
        <!-- Transport same mode -->
        <div class="transport-box">
          <div class="transport-box-lbl">📍 Location &amp; Transport (optional)</div>
          <div class="row2" style="margin-bottom:.65rem">
            <div class="field" style="margin:0">
              <label>Location</label>
              <input type="text" list="locDs" class="aLocation" data-i="${i}" value="${esc(a.location||'')}" placeholder="e.g. City Aquatic Centre" onblur="saveLocationName(this.value)">
            </div>

              <label>Travel time (min)</label>
              <input type="number" class="aTransMins" data-i="${i}" value="${a.transMins||''}" placeholder="e.g. 20" min="0" max="180">

          <div class="row2">
            <div class="field" style="margin:0">
              <label>Getting there</label>
              <select class="aTransTo" data-i="${i}">
                ${TRANSPORT_OPTS.map(o=>`<option value="${o.v}" ${(a.transTo||'')==o.v?'selected':''}>${o.l}</option>`).join('')}
              </select>

// BIND
// ══════════════════════════════════════════════
function bindStep(){
  document.getElementById('btnNext')?.addEventListener('click',()=>{ collectStep(); step++; render(); });
  document.getElementById('btnBack')?.addEventListener('click',()=>{ collectStep(); step--; render(); });
  document.getElementById('btnAddAct')?.addEventListener('click',()=>{
    collectStep();
    ch().activities.push({name:'',start:'',end:'',days:[],colorIdx:nextColorIdx(),perDay:false,daySlots:{},note:'',transTo:'',transFrom:'',transMins:''});
    save(); render();
    const idx=ch().activities.length-1;
    const el=document.getElementById(`act_${idx}`);
    if(el){
      if(!el.classList.contains('open')) el.classList.add('open');
      setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
    }
  });
  document.getElementById('btnAddHw')?.addEventListener('click',()=>{
    collectStep();
    if(!ch().homework) ch().homework=[];
    ch().homework.push({name:'',estMins:20,dueDay:4,days:[],colorIdx:nextHwColorIdx(),note:''});
    save(); render();
    const idx=ch().homework.length-1;
    const el=document.getElementById(`hw_${idx}`);
    if(el&&!el.classList.contains('open')) el.classList.add('open');
  });
  document.getElementById('btnAddHab')?.addEventListener('click',()=>{
    collectStep();
    if(!ch().habits) ch().habits=[];
    ch().habits.push({name:'',mins:15,when:'morning',days:[0,1,2,3,4,5,6],colorIdx:nextHabColorIdx()});
    save(); render();
    const idx=ch().habits.length-1;
    const el=document.getElementById(`hab_${idx}`);
    if(el&&!el.classList.contains('open')) el.classList.add('open');
  });
}

function nextColorIdx(){
  const used=ch().activities.map(a=>a.colorIdx||0);
  for(let i=0;i<COLORS.length;i++) if(!used.includes(i)) return i;
  return used.length % COLORS.length;
}
function nextHwColorIdx(){
  const used=(ch().homework||[]).map(h=>h.colorIdx||0);
  for(let i=0;i<COLORS.length;i++) if(!used.includes(i)) return i;
  return used.length % COLORS.length;
}
function nextHabColorIdx(){
  const used=(ch().habits||[]).map(h=>h.colorIdx||0);
  for(let i=0;i<COLORS.length;i++) if(!used.includes(i)) return i;
  return used.length % COLORS.length;
}

function collectStep(){
  const c=ch();
  if(step===0){ /* theme — nothing to collect from DOM */ }
  if(step===1){
    c.name=document.getElementById('fName')?.value||c.name;
    c.wakeTime=document.getElementById('fWake')?.value||c.wakeTime;
    c.sleepTarget=document.getElementById('fSleep')?.value||c.sleepTarget;
    if(!c.dayTimes) c.dayTimes={};
    DAYS.forEach((_,di)=>{
      const w=document.querySelector(`.dtWake[data-di="${di}"]`)?.value||'';
      const s=document.querySelector(`.dtSleep[data-di="${di}"]`)?.value||'';
      c.dayTimes[di]={ wake:w, sleep:s };
    });
  }
  if(step===2){
    c.schoolStart=document.getElementById('fSchStart')?.value||c.schoolStart;
    c.schoolEnd=document.getElementById('fSchEnd')?.value||c.schoolEnd;
    c.schoolDays=[...document.querySelectorAll('.sch-day:checked')].map(el=>+el.value);
    const nsCb=document.getElementById('noSchoolToggle');
    if(nsCb) c.noSchoolThisWeek=nsCb.checked;
  }
  if(step===3){
    document.querySelectorAll('#actList .act-card').forEach((card,i)=>{
      const a=c.activities[i]; if(!a) return;
      a.name=card.querySelector('.aName')?.value||'';
      a.note=card.querySelector('.aNote')?.value||'';
      a.perDay=card.querySelector('.aPerDay')?.checked||false;
      const cc=card.querySelector('.aColor:checked');
      a.colorIdx=cc?+cc.value:0;
      if(!a.perDay){
        a.start=card.querySelector('.aStart')?.value||'';
        a.end=card.querySelector('.aEnd')?.value||'';
        a.days=[...card.querySelectorAll('.aDay:checked')].map(el=>+el.value);
        a.location=card.querySelector('.aLocation')?.value||'';
        a.transTo=card.querySelector('.aTransTo')?.value||'';
        a.transFrom=card.querySelector('.aTransFrom')?.value||'';
        a.transMins=card.querySelector('.aTransMins')?.value||'';
      } else {
        a.daySlots={};
        DAYS.forEach((_,di)=>{
          a.daySlots[di]={
            on:card.querySelector(`.aSlotOn[data-di="${di}"]`)?.checked||false,
            start:card.querySelector(`.aSlotStart[data-di="${di}"]`)?.value||'',
            end:card.querySelector(`.aSlotEnd[data-di="${di}"]`)?.value||'',
            location:card.querySelector(`.aSlotLoc[data-di="${di}"]`)?.value||'',
            transTo:card.querySelector(`.aSlotTransTo[data-di="${di}"]`)?.value||'',
            transFrom:card.querySelector(`.aSlotTransFrom[data-di="${di}"]`)?.value||'',
            transMins:card.querySelector(`.aSlotMins[data-di="${di}"]`)?.value||'',
          };
        });
        a.days=DAYS.map((_,di)=>di).filter(di=>a.daySlots[di]?.on);
      }
    });
  }
  if(step===4){
    // Only collect from DOM if the sections are actually expanded and rendered
    const hwCards=document.querySelectorAll('#hwList .act-card');
    if(hwCards.length){
      hwCards.forEach((card,i)=>{
        const h=c.homework[i]; if(!h) return;
        h.name=card.querySelector('.hwName')?.value||'';
        h.note=card.querySelector('.hwNote')?.value||'';
        h.estMins=+card.querySelector('.hwMins')?.value||20;
        h.dueDay=card.querySelector('.hwDue')?.value;
        h.dueDate=card.querySelector('.hwDueDate')?.value||'';
        h.when=card.querySelector('.hwWhen')?.value||'anytime';
        h.days=[...card.querySelectorAll('.hwDay:checked')].map(el=>+el.value);
        h.linkedActivity=card.querySelector('.hwLinkedAct')?.value||'';
        const cc=card.querySelector('.hwColor:checked');
        h.colorIdx=cc?+cc.value:0;
      });
    }
    if(!c.habits) c.habits=[];
    const habCards=document.querySelectorAll('#habList .act-card');
    if(habCards.length){
      habCards.forEach((card,i)=>{
        const h=c.habits[i]; if(!h) return;
        h.name=card.querySelector('.habName')?.value||'';
        h.mins=+card.querySelector('.habMins')?.value||15;
        h.when=card.querySelector('.habWhen')?.value||'morning';
        h.days=[...card.querySelectorAll('.habDay:checked')].map(el=>+el.value);
        const cc=card.querySelector('.habColor:checked');
        h.colorIdx=cc?+cc.value:0;
      });
    }
  }
  save(); flash();
}

function clearPerDaySelection(i){
  // Uncheck all Active checkboxes and clear all fields for every day
  DAYS.forEach((_,di)=>{
    const on=document.querySelector(`.aSlotOn[data-i="${i}"][data-di="${di}"]`);
    const start=document.querySelector(`.aSlotStart[data-i="${i}"][data-di="${di}"]`);
    const end=document.querySelector(`.aSlotEnd[data-i="${i}"][data-di="${di}"]`);
    const loc=document.querySelector(`.aSlotLoc[data-i="${i}"][data-di="${di}"]`);
    const tt=document.querySelector(`.aSlotTransTo[data-i="${i}"][data-di="${di}"]`);
    const tf=document.querySelector(`.aSlotTransFrom[data-i="${i}"][data-di="${di}"]`);
    const mins=document.querySelector(`.aSlotMins[data-i="${i}"][data-di="${di}"]`);
    if(on) on.checked=false;
    if(start) start.value='';
    if(end) end.value='';
    if(loc) loc.value='';
    if(tt) tt.value='';
    if(tf) tf.value='';
    if(mins) mins.value='';
  });
  // Clear state
  const a=ch().activities[i]; if(!a) return;
  a.daySlots={}; a.days=[];
  liveActMeta(i);
  save();
}

function clearActSelection(i){
  // Uncheck all day checkboxes
  document.querySelectorAll(`#act_${i} .aDay`).forEach(cb=>cb.checked=false);
  // Clear start/end times
  const start=document.querySelector(`#act_${i} .aStart`);
  const end=document.querySelector(`#act_${i} .aEnd`);
  if(start) start.value='';
  if(end) end.value='';
  // Clear location
  const loc=document.querySelector(`#act_${i} .aLocation`);
  if(loc) loc.value='';
  // Reset transport selects to first option (none)
  const transTo=document.querySelector(`#act_${i} .aTransTo`);
  const transFrom=document.querySelector(`#act_${i} .aTransFrom`);
  const transMins=document.querySelector(`#act_${i} .aTransMins`);
  if(transTo) transTo.value='';
  if(transFrom) transFrom.value='';
  if(transMins) transMins.value='';
  // Update state and header meta
  const a=ch().activities[i]; if(!a) return;
  a.days=[]; a.start=''; a.end='';
  a.location=''; a.transTo=''; a.transFrom=''; a.transMins='';
  liveActMeta(i);
  save();
}

function removeAct(i){
  collectStep();
  ch().activities.splice(i,1);
  save(); render();
}

function moveAct(i, dir){
  collectStep();
  const acts=ch().activities;
  const j=i+dir;
  if(j<0||j>=acts.length) return;
  [acts[i],acts[j]]=[acts[j],acts[i]];
  save(); render();
  setTimeout(()=>{ document.getElementById(`act_${j}`)?.scrollIntoView({behavior:'smooth',block:'nearest'}); },100);
}

function duplicateAct(i){
  collectStep();
  const acts=ch().activities;
  const copy=JSON.parse(JSON.stringify(acts[i]));
  copy.name=(copy.name?copy.name+' (copy)':'Copy');
  acts.splice(i+1,0,copy);
  save(); render();
  // Open the new duplicate and scroll to it
  setTimeout(()=>{
    const el=document.getElementById(`act_${i+1}`);
    if(el){ if(!el.classList.contains('open')) el.classList.add('open'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  },100);
}

function flash(){
  const b=document.getElementById('savedBadge'); if(!b) return;
  b.classList.add('show'); setTimeout(()=>b.classList.remove('show'),1600);
}

    confirmLabel:'Duplicate',
    onConfirm:()=>{
      const nm=document.getElementById('modalInput')?.value?.trim();

function switchChild(i){
  collectStep(); S.activeIdx=i; S.children[i]=sanitiseChild(S.children[i]); step=1; save(); render();
}
function addChild(){
  collectStep();
  showModal({
    title:'Add a child',
    body:`<div class="field"><label>Child's name</label><input type="text" id="modalInput" placeholder="e.g. Emma" style="width:100%;padding:.6rem .85rem;border:1.5px solid var(--border);border-radius:var(--r2);font-size:.95rem"></div>`,
    confirmLabel:'Add',

function delChild(i){

    title:`Remove ${esc(S.children[i]?.name||'this child')}?`,

function doPrint(){

function doShareLink(){
  collectStep();
  try {
    const c = ch();

    // ── Compression helpers ──
    // Encode HH:MM time → minutes integer (saves ~2 chars per time after JSON+LZ)
    const tm = t => { if(!t) return undefined; const [h,m]=t.split(':'); return +h*60+ +m; };
    // Encode days array → bitmask integer (e.g. [0,1,2,3,4] → 31)
    const dm = d => d?.length ? d.reduce((b,i)=>b|(1<<i),0) : undefined;
    // Only include if differs from default
    const nz = (v,def) => v!==undefined && v!==def && v!=='' && v!==false ? v : undefined;

    const D_MASK = 31; // Mon-Fri default = 0b0011111

    const slim = {
      n: c.name||undefined,
      w: nz(tm(c.wakeTime), tm('07:30')),
      ss: nz(tm(c.schoolStart), tm('09:00')),
      se: nz(tm(c.schoolEnd), tm('15:30')),
      st: nz(tm(c.sleepTarget), tm('20:30')),
      sd: nz(dm(c.schoolDays||[0,1,2,3,4]), D_MASK),
      ns: c.noSchoolThisWeek||undefined,
      th: S.theme!=='neutral' ? S.theme : undefined,
      wo: S.weekOf||undefined,
      // dayTimes: only non-default per-day overrides
      dt: (() => {
        const out={};
        Object.entries(c.dayTimes||{}).forEach(([di,v])=>{
          const e={};
          const dw=tm(v.wake), ds=tm(v.sleep);
          if(dw!==undefined && dw!==tm(c.wakeTime)) e.w=dw;
          if(ds!==undefined && ds!==tm(c.sleepTarget)) e.s=ds;
          if(Object.keys(e).length) out[di]=e;
        });
        return Object.keys(out).length ? out : undefined;
      })(),
      a: (c.activities||[]).filter(a=>a.name).map(a=>{
        const o={n:a.name};
        if(a.colorIdx) o.c=a.colorIdx;
        if(a.perDay){
          o.p=1;
          const ds={};
          Object.entries(a.daySlots||{}).forEach(([di,sl])=>{
            if(sl.on){
              const e={};
              const s=tm(sl.start), ev=tm(sl.end);
              if(s!==undefined) e.s=s;
              if(ev!==undefined) e.e=ev;
              if(sl.transTo) e.tt=sl.transTo;
              if(sl.transFrom) e.tf=sl.transFrom;
              if(sl.transMins) e.m=+sl.transMins;
              if(sl.location) e.l=sl.location;
              ds[di]=e;
            }
          });
          if(Object.keys(ds).length) o.ds=ds;
        } else {
          const s=tm(a.start), e=tm(a.end);
          if(s!==undefined) o.s=s;
          if(e!==undefined) o.e=e;
          const d=dm(a.days);
          if(d) o.d=d;
          if(a.transTo) o.tt=a.transTo;
          if(a.transFrom) o.tf=a.transFrom;
          if(a.transMins) o.m=+a.transMins;
          if(a.location) o.l=a.location;
        }
        if(a.note) o.nt=a.note;
        return o;
      }),
      h: (c.homework||[]).filter(h=>h.name).map(h=>{
        const o={n:h.name};
        if(h.colorIdx) o.c=h.colorIdx;
        if(h.estMins && h.estMins!==20) o.m=h.estMins;
        if(h.dueDay && h.dueDay!=='none') o.dd=h.dueDay;
        if(h.dueDate) o.dt=h.dueDate;
        const d=dm(h.days);
        if(d) o.d=d;
        if(h.when && h.when!=='anytime') o.w=h.when;
        if(h.note) o.nt=h.note;
        return o;
      }),
      hb: (c.habits||[]).filter(h=>h.name).map(h=>{
        const o={n:h.name};
        if(h.colorIdx) o.c=h.colorIdx;
        if(h.mins && h.mins!==15) o.m=h.mins;
        if(h.when && h.when!=='morning') o.w=h.when;
        const d=dm(h.days);
        if(d !== undefined && d !== 127) o.d=d; // 127 = all 7 days
        return o;
      }),
    };

    const clean = JSON.parse(JSON.stringify(slim, (_,v)=>v===undefined?undefined:v));
    const json = JSON.stringify(clean);
    const compressed = LZString.compressToEncodedURIComponent(json);
    const url = location.href.split('#')[0] + '#v=' + compressed;
    const chars = compressed.length;

    // Copy to clipboard then show modal
    const showModal_ = (copied) => {
      showModal({
        title:'🔗 Share link',
        body:`
          <p style="color:var(--ink3);font-size:.85rem;margin-bottom:.75rem">
            ${copied ? '✅ Link copied to clipboard!' : 'Tap the box to select, then copy manually.'}
            Anyone who opens it sees a <strong>view-only</strong> schedule.
          </p>
          <div style="position:relative">
            <input type="text" id="shareLinkInput" value="${url.replace(/"/g,'&quot;')}" readonly
              style="width:100%;padding:.5rem 3rem .5rem .7rem;border:1.5px solid var(--border);border-radius:8px;font-size:.72rem;background:#F8FAFC;cursor:text;word-break:break-all;font-family:monospace"
              onclick="this.select()">
            <button onclick="
              navigator.clipboard.writeText(document.getElementById('shareLinkInput').value)
                .then(()=>{this.textContent='✅';setTimeout(()=>this.textContent='📋',1500)})
                .catch(()=>document.getElementById('shareLinkInput').select());
            " style="position:absolute;right:.4rem;top:50%;transform:translateY(-50%);background:var(--accent);color:#fff;border:none;border-radius:6px;padding:.25rem .5rem;cursor:pointer;font-size:.85rem">📋</button>
          </div>
          <p style="color:var(--ink3);font-size:.75rem;margin-top:.5rem">
            💡 <strong>Tip:</strong> On mobile, long links in chat apps (WhatsApp, iMessage etc.) can appear broken or split across lines. Ask the recipient to <strong>copy the full link and paste it into their browser</strong> — don't tap it directly in the chat.
          </p>
          <p style="color:var(--ink3);font-size:.72rem;margin-top:.25rem;opacity:.7">Link size: ${chars} characters</p>`,
        confirmLabel:'Done',
        onConfirm:()=>{}
      });
    };

    navigator.clipboard.writeText(url).then(()=>showModal_(true)).catch(()=>showModal_(false));
  } catch(e) {
    showModal({
      title:'Could not generate link',
      body:`<p style="color:var(--ink3);font-size:.88rem">Try again or export as PDF instead.</p>`,
      confirmLabel:'OK', onConfirm:()=>{}
    });
  }
}

// ── Load from share hash — VIEW ONLY ──
function loadFromHash(){
  try {
    const hash = location.hash;
    if(!hash.startsWith('#v=')) return;
    const compressed = hash.slice(3);
    const json = LZString.decompressFromEncodedURIComponent(compressed);
    if(!json) return;
    const s = JSON.parse(json);

    // Decode helpers
    const fromTm = v => {
      if(v===undefined||v===null) return undefined;
      if(typeof v==='string') return v; // old format
      const h=Math.floor(v/60), m=v%60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    };
    const fromDm = v => {
      if(v===undefined||v===null) return undefined;
      if(Array.isArray(v)) return v; // old format
      return [0,1,2,3,4,5,6].filter(i=>(v>>i)&1);
    };

    const D = [0,1,2,3,4];

    const acts = (s.a||[]).map(a=>({
      name: a.n||a.nm||'', colorIdx: a.c??a.ci??0,
      perDay: !!(a.p||a.pd),
      start: fromTm(a.s)||'', end: fromTm(a.e)||'',
      days: fromDm(a.d)||[],
      daySlots: (() => {
        if(!(a.p||a.pd)||!a.ds) return {};
        const out={};
        Object.entries(a.ds).forEach(([di,sl])=>{
          out[di]={on:true, start:fromTm(sl.s)||'', end:fromTm(sl.e)||'',
            transTo:sl.tt||'', transFrom:sl.tf||'',
            transMins:sl.m||'', location:sl.l||''};
        });
        return out;
      })(),
      transTo: a.tt||'', transFrom: a.tf||'',
      transMins: a.m||a.tm||'', location: a.l||a.loc||'', note: a.nt||'',
    }));

    const dayTimes={};
    if(s.dt){
      Object.entries(s.dt).forEach(([di,v])=>{
        dayTimes[di]={wake:fromTm(v.w)||'', sleep:fromTm(v.s)||''};
      });
    }

    const c = sanitiseChild({
      name: s.n||'',
      wakeTime:    fromTm(s.w)||'07:30',
      schoolStart: fromTm(s.ss)||'09:00',
      schoolEnd:   fromTm(s.se)||'15:30',
      sleepTarget: fromTm(s.st)||'20:30',
      schoolDays:  fromDm(s.sd)||D,
      dayTimes, noSchoolThisWeek: s.ns||false,
      activities: acts,
      homework: (s.h||[]).map(h=>({
        name:h.n||h.nm||'', colorIdx:h.c??h.ci??0,
        estMins:h.m??20, dueDay:h.dd||'none', dueDate:h.dt||'',
        days:fromDm(h.d)||[], when:h.w||'anytime', note:h.nt||'',
      })),
      habits: (s.hb||[]).map(h=>({
        name:h.n||h.nm||'', colorIdx:h.c??h.ci??0,
        mins:h.m??15, when:h.w||'morning',
        days:fromDm(h.d)||[0,1,2,3,4,5,6],
      })),
    });

    // Hash kept in URL so recipient can bookmark this view
    if(s.th) applyTheme(s.th);
    if(s.wo) S.weekOf=s.wo;
    showReadOnly(c);
  } catch(e) {
    // Silently ignore malformed hashes
  }
}

function doPrintFromViewer(){
  const c = window._viewOnlyChild;
  if(!c) return;
  const html = buildPrintHTML(c);
  const win = window.open('','_blank');

  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(()=>{ win.print(); }, 400);
}

// SCHEDULE DATA BUILDER
// ══════════════════════════════════════════════
function buildRows(c){
  const schoolDays=c.schoolDays||[0,1,2,3,4];
  const timeSet=new Set();
  // Add all unique wake times across days
  DAYS.forEach((_,di)=>{
    const w=(c.dayTimes&&c.dayTimes[di]&&c.dayTimes[di].wake)||c.wakeTime;
    if(w) timeSet.add(w);
  });
  timeSet.add(c.schoolStart);
  (c.activities||[]).forEach(a=>{
    if(!a.perDay){ if(a.start) timeSet.add(a.start); }
    else if(a.daySlots){ Object.values(a.daySlots).forEach(sl=>{ if(sl.on&&sl.start) timeSet.add(sl.start); }); }
  });
  const sorted=[...timeSet].sort();
  sorted.push('sleep');

  return sorted.map(t=>{
    const cells=DAYS.map((_,di)=>{
      const items=[];
      const dayWake=(c.dayTimes&&c.dayTimes[di]&&c.dayTimes[di].wake)||c.wakeTime;
      const daySleep=(c.dayTimes&&c.dayTimes[di]&&c.dayTimes[di].sleep)||c.sleepTarget;
      if(t===dayWake){
        items.push({label:`🌅 Wake ${dayWake}`,bg:'#FFF7ED',tx:'#9A3412',transport:false});
      }
      if(t===c.schoolStart && schoolDays.includes(di) && !c.noSchoolThisWeek){
        items.push({label:`School\n${c.schoolStart}–${c.schoolEnd}`,bg:'#DBEAFE',tx:'#1E40AF',transport:false});
      }
      if(t!=='sleep'&&t!==dayWake&&t!==c.schoolStart){
        (c.activities||[]).forEach(a=>{
          let on=false,start=a.start,end=a.end,location='',transTo='',transFrom='',transMins='';
          if(!a.perDay){
            on=(a.days||[]).includes(di)&&a.start===t;
            start=a.start; end=a.end;
            transTo=a.transTo||''; transFrom=a.transFrom||''; transMins=a.transMins||'';
            location=a.location||'';
          } else if(a.daySlots&&a.daySlots[di]){
            const sl=a.daySlots[di];
            on=sl.on&&(sl.start||a.start)===t;
            start=sl.start||a.start; end=sl.end||a.end;
            transTo=sl.transTo||''; transFrom=sl.transFrom||''; transMins=sl.transMins||'';
            location=sl.location||a.location||'';
          }
          if(!on) return;
          const col=COLORS[a.colorIdx||0];
          let lbl=a.name||'Activity';
          if(start||end) lbl+=`\n${start}${end?'–'+end:''}`;
          if(location) lbl+=`\n📍 ${location}`;
          if(a.note) lbl+=`\n(${a.note})`;
          items.push({label:lbl,bg:col.bg,tx:col.tx,transport:false});
          if(transTo){
            const mins=transMins?` ~${transMins}min`:'';
            items.push({label:`→ ${tLabel(transTo)}${mins}`,bg:'#E0F2FE',tx:'#0369A1',transport:true});
          }
          if(transFrom){
            items.push({label:`← ${tLabel(transFrom)}`,bg:'#F3E8FF',tx:'#7C3AED',transport:true});
          }
        });
      }
      if(t==='sleep'){
        items.push({label:`Sleep ${daySleep}`,bg:'#F5F3FF',tx:'#4C1D95',transport:false});
      }
      return items;
    });
    return {time: t==='sleep'?'😴':t, cells};
  });
}

          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }

  if(hb.length){
    html+=`<div class="extras-section-hdr" style="margin-top:${hw.length?'12px':'0'};border-left-color:#2A9D8F;background:#F0FEFA">🌿 Good Habits</div>
    <table class="hab-table">
      <thead><tr>
        <th style="width:22%">Habit</th>
        <th style="width:8%">Time</th>
        <th style="width:10%">When</th>
        ${dayLabels.map(d=>`<th style="width:8%;text-align:center">${d}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${hb.map(h=>{
          const col=COLORS[h.colorIdx||0];
          const when=h.when==='morning'?'🌅 Morning':h.when==='afternoon'?'☀️ Afternoon':h.when==='evening'?'🌙 Evening':'Anytime';
          return `<tr>
            <td style="background:${col.bg};color:${col.tx};font-weight:700">${esc(h.name)}</td>
            <td style="text-align:center">~${h.mins}min</td>
            <td>${when}</td>
            ${DAYS.map((_,di)=>`<td class="tick">${(h.days||[]).includes(di)?'<input type="checkbox" class="tick-cb">':''}</td>`).join('')}
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }

  return html;
}

function resetAll(){
  showModal({
    title:'Reset all data?',
    body:`<p style="color:var(--ink3);font-size:.88rem">This clears all children, schedules, and saved activity names. This can't be undone.</p>`,
    confirmLabel:'Reset everything',
    confirmClass:'btn-red',
    onConfirm:()=>{
      localStorage.removeItem('wplan3');
      S = { children:[newChild('Child 1')], activeIdx:0, activityNames:[] };
      step=0; render();
    }
  });
}

// ── INLINE MODAL ──
function showModal({title, body, confirmLabel='OK', confirmClass='btn-primary', onConfirm}){
  document.getElementById('modalOverlay')?.remove();
  const el=document.createElement('div');
  el.id='modalOverlay';
  el.style.cssText='position:fixed;inset:0;background:rgba(44,36,22,.45);display:flex;align-items:center;justify-content:center;z-index:9999';
  el.innerHTML=`<div style="background:#FFFCF7;border-radius:14px;padding:1.75rem;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.2)">
    <h3 style="font-family:Nunito,sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:.6rem">${title}</h3>
    <div style="margin-bottom:1.25rem">${body}</div>
    <div style="display:flex;gap:.75rem;justify-content:flex-end">
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('modalOverlay').remove()">Cancel</button>
      <button class="btn ${confirmClass} btn-sm" id="modalConfirm">${confirmLabel}</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  el.addEventListener('click',e=>{ if(e.target===el) el.remove(); });
  document.getElementById('modalConfirm').addEventListener('click',()=>{ el.remove(); onConfirm(); });
}

// ── INIT ──
loadFromHash();
applyTheme(S.theme||'neutral');
render();
